const TILE_OPTS = {
  maxZoom: 19,
  updateWhenIdle: false,
  updateWhenZooming: true,
  keepBuffer: 2,
};
function baseLayers(){

    [mapLabel]: L.tileLayer(
      "https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png",
      { ...TILE_OPTS, maxZoom: 20, subdomains: "abcd", attribution: "&copy; OpenStreetMap &copy; CARTO" }
    ),
    [satLabel]: L.tileLayer(
      "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
      { ...TILE_OPTS, attribution: "Esri World Imagery" }

}

/** Stable street/sat layers — avoid i18n key mismatch leaving L.map with no basemap. */
function createBaseTileLayers(){
  const street = L.tileLayer(
    "https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png",
    { ...TILE_OPTS, maxZoom: 20, subdomains: "abcd", attribution: "&copy; OpenStreetMap &copy; CARTO" }
  );

function clearMapLoadingOverlays(el){
  if(!el) return;
  el.querySelectorAll(":scope > .map-loading-overlay").forEach((n) => n.remove());
}

function invalidateMapInstance(map){
  if(!map) return;
  try {
    map.invalidateSize({ animate: false });
    if(map._renderer && typeof map._renderer._update === "function") map._renderer._update();
    // Force tile reload after flex/absolute layout settles (0×0 init leaves gray pane).
    map.eachLayer((layer) => {
      if(layer && typeof layer.redraw === "function"){
        try { layer.redraw(); } catch(e){}
      }
    });
  } catch(e){}
}

function invalidateLeadMapSize(){
  invalidateMapInstance(window._leadMap);
}

function bindMapResizeObserver(map, el){
  if(!map || !el || typeof ResizeObserver === "undefined") return;
  if(el._psResizeObs){
    try { el._psResizeObs.disconnect(); } catch(e){}
  }
  const obs = new ResizeObserver(() => {
    invalidateMapInstance(map);
  });
  obs.observe(el);
  if(el.parentElement) obs.observe(el.parentElement);
  el._psResizeObs = obs;
  map.once("unload", () => {
    try { obs.disconnect(); } catch(e){}
    el._psResizeObs = null;
  });
}

function scheduleMapSizeFix(map, el){
  bindMapResizeObserver(map, el);
  const fix = () => invalidateMapInstance(map);
  requestAnimationFrame(() => {
    fix();
    setTimeout(fix, 50);
    setTimeout(fix, 200);
    setTimeout(fix, 500);
  });
}

/** Rebuild visible markers for current filtered leads without remounting Leaflet. */
function softSyncLeadMapMarkers(leads){
  const map = window._leadMap;
  if(!map || typeof L === "undefined") return;
  const want = new Set();
  const mappable = [];
  (leads || []).forEach((l) => {
    const ll = leadLatLng(l);
    if(!ll) return;
    want.add(l.id);
    mappable.push({ lead: l, ...ll });
  });

  if(!window._leadMapMarkers) window._leadMapMarkers = {};
  let layer = window._leadMapMarkerLayer;
  if(!layer){
    layer = L.layerGroup().addTo(map);
    window._leadMapMarkerLayer = layer;
  }

  Object.keys(window._leadMapMarkers).forEach((id) => {
    if(want.has(id)) return;
    const m = window._leadMapMarkers[id];
    try {
      if(layer && typeof layer.removeLayer === "function") layer.removeLayer(m);
      else map.removeLayer(m);
    } catch(e){}
    delete window._leadMapMarkers[id];
  });

  mappable.forEach((row) => {
    const l = row.lead;
    const selected = state.mapFocusLeadId === l.id;
    let marker = window._leadMapMarkers[l.id];
    if(marker){
      try {
        marker.setLatLng([row.lat, row.lng]);
        marker.setStyle(leadMarkerStyle(l, selected));
        marker.setPopupContent(leadMarkerPopupHtml(l));
      } catch(e){}
      return;
    }
    marker = L.circleMarker([row.lat, row.lng], leadMarkerStyle(l, selected));
    marker.bindPopup(leadMarkerPopupHtml(l), { maxWidth: 320, className: "lm-popup-wrap" });
    marker.bindTooltip(leadMarkerTooltipHtml(l), {
      direction: "top",
      offset: [0, -8],
      opacity: 0.95,
      className: "lm-marker-tip",
    });
    marker.on("click", ()=>{ window._focusLeadOnMap(l.id); });
    if(typeof layer.addLayer === "function") layer.addLayer(marker);
    else marker.addTo(map);
    window._leadMapMarkers[l.id] = marker;
  });

  syncLeadMarkerSelection(state.mapFocusLeadId);
  if(mappable.length){
    const bounds = mappable.map((r) => [r.lat, r.lng]);
    if(state.mapLayers.office) bounds.push([SALES_OFFICE.lat, SALES_OFFICE.lng]);
    if(!(state.mapFocusLeadId && window._leadMapMarkers[state.mapFocusLeadId])){
      try { map.fitBounds(bounds, { padding:[36,36], maxZoom:14 }); } catch(e){}
    }
  }
}

function clearLeadDistanceMeasure(){

function updateLeadFocusChip(lead){

/** Sky-style distance read-out: dashed office→lead line + mid-point miles label. */
function syncLeadDistanceMeasure(focusId){
  clearLeadDistanceMeasure();
  const map = window._leadMap;
  if(!map || !focusId || typeof L === "undefined"){
    updateLeadFocusChip(null);
    return;
  }
  const lead = getLeadById(focusId);
  const ll = leadLatLng(lead);
  if(!lead || !ll){
    updateLeadFocusChip(null);
    return;

  updateLeadFocusChip(lead);
  const dist = leadDistanceMiles(lead);
  const line = L.polyline(
    [[SALES_OFFICE.lat, SALES_OFFICE.lng], [ll.lat, ll.lng]],
    {
      color: "#0B2036",
      weight: 2,
      dashArray: "6 5",

    }
  ).addTo(map);

  if(dist != null){
    const mid = L.latLng(
      (SALES_OFFICE.lat + ll.lat) / 2,
      (SALES_OFFICE.lng + ll.lng) / 2
    );
    const text = st("sales.mapView.distFromOffice","{mi} from Premier office", { mi: fmtMiles(dist) });

      interactive: false,

function syncLeadMarkerSelection(focusId){
  const markers = window._leadMapMarkers || {};
  Object.keys(markers).forEach((mid) => {
    const m = markers[mid];
    const lead = getLeadById(mid);
    if(!m || !lead || typeof m.setStyle !== "function") return;
    m.setStyle(leadMarkerStyle(lead, mid === focusId));
    if(mid === focusId && typeof m.bringToFront === "function"){
      try { m.bringToFront(); } catch(e){}
    }
  });
  syncLeadDistanceMeasure(focusId);
}

/** Soft-add a lead marker onto the live Lead Map without remounting Leaflet. */
function softAddLeadMarker(lead){
  const map = window._leadMap;
  const ll = leadLatLng(lead);
  if(!map || !ll || typeof L === "undefined") return false;
  if(!window._leadMapMarkers) window._leadMapMarkers = {};
  if(window._leadMapMarkers[lead.id]){
    syncLeadMarkerSelection(state.mapFocusLeadId);
    return true;
  }

  const selected = state.mapFocusLeadId === lead.id;
  // Avoid pinning renderer to map.options.renderer — preferCanvas + flex-0 init
  // leaves a blank canvas; default SVG paths redraw after invalidateSize.
  const marker = L.circleMarker([ll.lat, ll.lng], leadMarkerStyle(lead, selected));
  marker.bindPopup(leadMarkerPopupHtml(lead), { maxWidth: 320, className: "lm-popup-wrap" });
  marker.bindTooltip(leadMarkerTooltipHtml(lead), {
    direction: "top",
    offset: [0, -8],
    opacity: 0.95,
    className: "lm-marker-tip",
  });
  marker.on("click", ()=>{ window._focusLeadOnMap(lead.id); });
  const layer = window._leadMapMarkerLayer;
  if(layer && typeof layer.addLayer === "function") layer.addLayer(marker);
  else marker.addTo(map);
  window._leadMapMarkers[lead.id] = marker;

  // Soft-clear "no pin" hint on the list row.
  const row = document.querySelector(`.lm-lead[data-focus-lead="${CSS.escape(lead.id)}"]`);
  if(row){
    const addr = row.querySelector(".lm-lead-addr");
    if(addr) addr.textContent = lead.address || "";
    const distEl = row.querySelector(".lm-lead-dist");
    const dist = leadDistanceMiles(lead);
    if(dist != null){
      if(distEl) distEl.textContent = fmtMiles(dist);
      else {
        const col = row.children[2];
        if(col){
          const span = document.createElement("span");
          span.className = "lm-lead-dist";
          span.title = st("sales.mapView.fromOffice","from Premier office");
          span.textContent = fmtMiles(dist);
          col.appendChild(span);
        }
      }
    }
  }
  const stats = leadsCoordStats();
  document.querySelectorAll(".lead-map-count").forEach((el) => {
    el.textContent = `${st("sales.mapView.count","{n} leads", {n: stats.total})} · ${st("sales.stat.onMap","{n} on map", {n: stats.withCoords})}`;
  });
  return true;
}

function focusLeadMarker(id, lead){
  const marker = window._leadMapMarkers && window._leadMapMarkers[id];
  const map = window._leadMap;
  if(!map || !marker) return false;
  try{
    syncLeadMarkerSelection(id);
    const openFocused = ()=>{
      map.setView(marker.getLatLng(), Math.max(map.getZoom(), 15));
      try { marker.openPopup(); } catch(e){}
    };
    if(marker.__parent && typeof marker.__parent.zoomToShowLayer === "function"){
      marker.__parent.zoomToShowLayer(marker, openFocused);
    } else {
      openFocused();
    }
    showToast(st("sales.mapView.focused","Focused: {name}", { name: lead.name || lead.address }), { ms: 1600 });
    return true;
  }catch(e){
    showToast(st("sales.mapView.focusFail","Could not focus marker on the map"));
    return false;
  }
}

window._focusLeadOnMap = async (id)=>{
  state.mapFocusLeadId = id;
  // Soft-update list selection without full remount
  document.querySelectorAll(".lm-lead").forEach(el=>{
    el.classList.toggle("active", el.dataset.focusLead === id);
  });
  const row = document.querySelector(`.lm-lead[data-focus-lead="${CSS.escape(id)}"]`);
  if(row) row.scrollIntoView({ block:"nearest", behavior:"smooth" });

  const lead = getLeadById(id);
  if(!lead){
    showToast(st("sales.mapView.focusMissing","Lead not found in current results"));
    return;
  }

  // If this lead has no pin yet, geocode once and soft-add the marker (no remount).
  if(!leadLatLng(lead) && lead.address && !lead._geoTried){
    lead._geoTried = true;
    showToast(st("sales.mapView.geocoding","Locating {name} on the map…", { name: lead.name || lead.address }));
    try{
      const res = await fetch(`/api/geocode?address=${encodeURIComponent(lead.address)}`, { credentials:"include" });
      const data = await res.json();
      if(res.ok && data.lat != null && data.lng != null){
        lead.lat = Number(data.lat);
        lead.lng = Number(data.lng);
        lead._approxGeo = true;
        lead._geoProvider = data.provider || "address";
        if(softAddLeadMarker(lead) && focusLeadMarker(id, lead)) return;
        // Fallback: single remount only if the live map layer is unavailable.
        render();
        requestAnimationFrame(()=> window._focusLeadOnMap(id));
        return;
      }
      showToast(data.error || st("sales.mapView.noPinToast","No map pin for this lead — address could not be located"));
      return;
    }catch(e){
      showToast(st("sales.mapView.noPinToast","No map pin for this lead — address could not be located"));
      return;
    }
  }

  if(focusLeadMarker(id, lead)) return;

  if(leadLatLng(lead)){
    // Coords exist but marker missing — soft-add when possible, else remount once.
    if(softAddLeadMarker(lead) && focusLeadMarker(id, lead)) return;
    render();
    requestAnimationFrame(()=>{
      const m = window._leadMapMarkers && window._leadMapMarkers[id];
      const map2 = window._leadMap;
      if(map2 && m){
        map2.setView(m.getLatLng(), 15);
        try{ m.openPopup(); }catch(e){}
        showToast(st("sales.mapView.focused","Focused: {name}", { name: lead.name || lead.address }), { ms: 1600 });
      }
    });
    return;
  }

  showToast(st("sales.mapView.noPinToast","No map pin for this lead — missing coordinates"));
};

function milesToMeters(mi){ return mi * 1609.344; }

function markerRadiusForScore(score){

  return 6;
}

const SPC_FILL = { TSTM:"#c1e9c1", MRGL:"#66a366", SLGT:"#ffe066", ENH:"#ffa366", MDT:"#ff6666", HIGH:"#ff66ff" };
const SEV_FILL = { Extreme:"#7c0a02", Severe:"#e63900", Moderate:"#ff9100", Minor:"#ffd000", Unknown:"#3aa0ff" };
const HAIL_PROB_FILL = { "0.05":"#8b4726", "0.15":"#ffc800", "0.30":"#ff0000", "0.45":"#ff00ff", "0.60":"#912cee", SIGN:"#0a0a0a" };
const WX_ZONE = "IL";

function spcOutlookStyle(f){
  const label = String((f.properties && (f.properties.LABEL || f.properties.DN)) || "").toUpperCase();
  const c = SPC_FILL[label] || "#888";
  return { color: c, weight: 1, fillColor: c, fillOpacity: 0.22, dashArray: "4 3", interactive: false };
}
function alertPolyStyle(f){
  const sev = (f.properties && f.properties.severity) || "Unknown";
  const c = SEV_FILL[sev] || SEV_FILL.Unknown;
  return { color: c, weight: 2, fillColor: c, fillOpacity: 0.28, interactive: false };
}
function hailFcStyle(f){
  const p = f.properties || {};
  const label = String(p.LABEL || p.DN || "");
  const c = p.fill || HAIL_PROB_FILL[label] || "#888";
  const sig = label === "SIGN";
  return { color: p.stroke || c, weight: sig ? 2 : 1, fillColor: c, fillOpacity: sig ? 0.08 : 0.28, dashArray: sig ? "3 4" : null, interactive: false };
}
function hailColor(inch){
  if(inch >= 2.5) return "#e63900";
  if(inch >= 1.75) return "#ff9100";
  if(inch >= 1.0) return "#ffd000";
  return "#3aa0ff";
}
function hailRadius(inch){ return Math.max(5, Math.min(16, 5 + inch * 3.5)); }
function scoreTierColor(tier){
  if(tier === "campaign") return "#c1121f";
  if(tier === "review") return "#e85d04";
  return "#ffd000";
}

function wxCacheGet(key){ return state.weatherCache && state.weatherCache[key]; }
function wxCacheSet(key, value){
  if(!state.weatherCache) state.weatherCache = {};
  state.weatherCache[key] = value;
  return value;
}

async function fetchWxJson(url){
  const res = await fetch(url, { credentials:"include", headers:{ Accept:"application/geo+json, application/json" } });
  if(!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

async function ensureSpcOutlook(){
  if(state.lastSpcOutlook && state.lastSpcOutlook.features) return state.lastSpcOutlook;
  const hit = wxCacheGet("spc");
  if(hit){ state.lastSpcOutlook = hit; return hit; }
  try{
    const data = await fetchWxJson("/api/spc?day=1&type=cat");
    if(data && data.features){
      state.lastSpcOutlook = data;
      wxCacheSet("spc", data);
    }
    return state.lastSpcOutlook;
  }catch{ return null; }
}

async function ensureHailForecast(){
  const hit = wxCacheGet("hailFc");
  if(hit) return hit;
  try{
    const data = await fetchWxJson("/api/spc?day=1&type=hail");
    if(data && data.features) return wxCacheSet("hailFc", data);
  }catch(e){ console.warn("Hail forecast:", e.message); }
  return null;
}

function parseHailCsv(text){
  const out = [];
  for(const line of String(text || "").split(/\r?\n/)){
    if(!line || /^time\s*,/i.test(line)) continue;
    const parts = line.split(",");
    if(parts.length < 7) continue;
    const lat = parseFloat(parts[5]);
    const lon = parseFloat(parts[6]);
    if(!Number.isFinite(lat) || !Number.isFinite(lon)) continue;
    out.push({
      time: parts[0],
      sizeIn: (parseInt(parts[1], 10) || 0) / 100,
      location: parts[2],
      county: parts[3],
      state: parts[4],
      lat, lon,
      comments: parts.slice(7).join(","),
    });
  }
  return out;
}

async function ensureHailReports(){
  const hit = wxCacheGet("hailRep");
  if(hit) return hit;
  try{
    const res = await fetch("/api/spc-reports?period=today", { credentials:"include" });
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const text = await res.text();
    const rows = parseHailCsv(text);
    const il = rows.filter(r => String(r.state || "").toUpperCase() === WX_ZONE);
    return wxCacheSet("hailRep", il);
  }catch(e){
    console.warn("Hail reports:", e.message);
    return []; // don't cache failure — allow retry on next toggle
  }
}

async function ensureNwsAlerts(){
  const hit = wxCacheGet("alerts");
  if(hit) return hit;
  try{
    const data = await fetchWxJson(`https://api.weather.gov/alerts/active?area=${WX_ZONE}`);
    return wxCacheSet("alerts", data);
  }catch(e){
    console.warn("NWS alerts:", e.message);
    return null;
  }
}

async function ensureStormScores(){
  const hit = wxCacheGet("scores");
  if(hit) return hit;
  try{
    const data = await fetchWxJson(`/api/storm-score?zone=${WX_ZONE}`);
    return wxCacheSet("scores", data);
  }catch(e){
    console.warn("Storm score:", e.message);
    return { hotspots: [] }; // don't cache failure — allow retry on next toggle
  }
}

function clearWxLayer(key){
  const bag = window._lmWeather || (window._lmWeather = {});
  const layer = bag[key];
  const map = window._leadMap;
  if(layer && map){
    try { map.removeLayer(layer); } catch(e){}
  }
  delete bag[key];
}

function setWxLayer(key, layer){
  const bag = window._lmWeather || (window._lmWeather = {});
  bag[key] = layer;
}

function bringLeadsToFront(){
  if(window._leadMapMarkerLayer && window._leadMap && window._leadMap.hasLayer(window._leadMapMarkerLayer)){
    try { window._leadMapMarkerLayer.bringToFront(); } catch(e){}
  }
}

async function syncSpcOutlookLayer(map){
  clearWxLayer("spc");
  if(!state.mapLayers.spc || !map) return;
  const outlook = await ensureSpcOutlook();
  if(!outlook?.features?.length || window._leadMap !== map) return;
  try{
    const layer = L.geoJSON(outlook, { style: spcOutlookStyle, interactive: false });
    layer.addTo(map);
    setWxLayer("spc", layer);
    window._leadMapSpcLayer = layer;
    bringLeadsToFront();
  }catch(e){}
}

async function syncAlertsLayer(map){
  clearWxLayer("alerts");
  if(!state.mapLayers.alerts || !map) return;
  const data = await ensureNwsAlerts();
  if(!data?.features || window._leadMap !== map) return;
  try{
    const layer = L.geoJSON(null, {
      style: alertPolyStyle,
      interactive: false,
      onEachFeature: (f, lyr) => {
        const p = f.properties || {};
        lyr.bindTooltip(`${p.event || "Alert"} · ${p.severity || ""}`, { sticky: true });
      },
    });
    // Features with their own geometry
    for(const f of data.features){
      if(f.geometry) layer.addData(f);
    }
    layer.addTo(map);
    setWxLayer("alerts", layer);
    bringLeadsToFront();

    // Sky parity: resolve zone geometry for alerts missing a polygon (cap concurrent fetches).
    const needZones = data.features.filter(f => !f.geometry && Array.isArray(f.properties?.affectedZones));
    let zoneBudget = 12;
    for(const f of needZones){
      if(window._leadMap !== map || !state.mapLayers.alerts) break;
      for(const z of (f.properties.affectedZones || []).slice(0, 3)){
        if(zoneBudget-- <= 0) break;
        try{
          const zres = await fetch(z, { headers:{ Accept:"application/geo+json" } });
          if(!zres.ok) continue;
          const zdata = await zres.json();
          if(zdata?.geometry && window._leadMap === map && state.mapLayers.alerts){
            layer.addData({ type:"Feature", properties:f.properties, geometry:zdata.geometry });
          }
        }catch(e){}
      }
    }
    bringLeadsToFront();
  }catch(e){}
}

async function syncHailForecastLayer(map){
  clearWxLayer("hailFc");
  if(!state.mapLayers.hailForecast || !map) return;
  const data = await ensureHailForecast();
  if(!data?.features?.length || window._leadMap !== map) return;
  try{
    const layer = L.geoJSON(data, { style: hailFcStyle, interactive: false });
    layer.addTo(map);
    setWxLayer("hailFc", layer);
    bringLeadsToFront();
  }catch(e){}
}

async function syncHailReportsLayer(map){
  clearWxLayer("hailRep");
  if(!state.mapLayers.hailReports || !map) return;
  const rows = await ensureHailReports();
  if(window._leadMap !== map) return;
  try{
    const layer = L.layerGroup();
    for(const r of rows || []){
      const m = L.circleMarker([r.lat, r.lon], {
        radius: hailRadius(r.sizeIn),
        color: "#111",
        weight: 1,
        fillColor: hailColor(r.sizeIn),
        fillOpacity: 0.9,
      });
      m.bindPopup(`<div class="lm-popup"><div class="lm-popup-name">${(r.sizeIn || 0).toFixed(2)}" hail</div><div class="lm-popup-addr">${escHtml(r.location || "")} · ${escHtml(r.county || "")}</div><div class="lm-popup-sub">${escHtml(r.time || "")}</div></div>`);
      layer.addLayer(m);
    }
    layer.addTo(map);
    setWxLayer("hailRep", layer);
    bringLeadsToFront();
  }catch(e){}
}

async function syncStormScoreLayer(map){
  clearWxLayer("scores");
  if(!state.mapLayers.stormScore || !map) return;
  const data = await ensureStormScores();
  if(window._leadMap !== map) return;
  try{
    const layer = L.layerGroup();
    for(const h of data.hotspots || []){
      const raw = h.score;
      const s = raw && typeof raw === "object" ? raw : {};
      const total = s.total != null ? s.total : (typeof raw === "number" ? raw : null);
      const tier = s.tier || (total >= 70 ? "campaign" : total >= 40 ? "review" : "none");
      if(h.lat == null || h.lon == null) continue;
      const m = L.circleMarker([h.lat, h.lon], {
        radius: Math.min(18, 8 + Math.floor((Number(total) || 0) / 12)),
        color: "#111",
        weight: 1,
        fillColor: scoreTierColor(tier),
        fillOpacity: 0.88,
      });
      const rows = (s.breakdown || []).map(b => `<li>${escHtml(b.variable)}: +${b.points}</li>`).join("");
      m.bindPopup(`<div class="lm-popup"><div class="lm-popup-name">Score ${total ?? "—"}</div><div class="lm-popup-sub">${escHtml(h.label || "")}</div>${rows ? `<ul style="margin:6px 0 0;padding-left:18px;font-size:12px">${rows}</ul>` : ""}</div>`);
      layer.addLayer(m);
    }
    layer.addTo(map);
    setWxLayer("scores", layer);
    bringLeadsToFront();
  }catch(e){}
}

/** Soft sync all Sky-style weather overlays (load on demand when enabled). */
async function syncWeatherLayers(map){
  if(!map || typeof L === "undefined") return;
  await Promise.all([
    syncAlertsLayer(map),
    syncSpcOutlookLayer(map),
    syncHailForecastLayer(map),
    syncHailReportsLayer(map),
    syncStormScoreLayer(map),
  ]);
  bringLeadsToFront();
}

function setupLeadMap(){
  const el = document.getElementById("lead-map");
  if(!el || typeof L === "undefined") return;
  clearMapLoadingOverlays(el);

  const useCluster = state.mapLayers.cluster && typeof L.markerClusterGroup === "function";
  const mapOpts = {
    scrollWheelZoom: true,
    // Always SVG for Lead Map. preferCanvas + flex height (often 0 at init) leaves
    // path overlays blank while tiles still paint — matches "Focused" toast, zero pins.
    preferCanvas: false,
    fadeAnimation: false,
    markerZoomAnimation: false,
  };
  const mappable = getFilteredSortedLeads().map(l => {
    const ll = leadLatLng(l);
    if(!ll) return null;
    return { lead: l, ...ll };
  }).filter(Boolean);
  const center = state.lastGeo || { lat: SALES_OFFICE.lat, lng: SALES_OFFICE.lng };
  const { street, controlLayers } = createBaseTileLayers();

  if(!mappable.length){
    if(state.loading){
      const map = L.map(el, mapOpts);
      street.addTo(map);
      window._maps.push(map);
      window._leadMap = map;
      addSalesGeoLayers(map);
      map.setView([center.lat, center.lng], 11);
      const overlay = document.createElement("div");
      overlay.className = "map-loading-overlay is-fetching";
      overlay.innerHTML = `<div class="map-loading-card">${st("sales.map.searching","Searching live leads near {zip}...", {zip: zipDisplayLabel(state.searchParams.zip)})}</div>`;
      el.appendChild(overlay);
      scheduleMapSizeFix(map, el);
      return;
    }
    const map = L.map(el, mapOpts);
    street.addTo(map);
    L.control.layers(controlLayers).addTo(map);
    window._maps.push(map);
    window._leadMap = map;
    addSalesGeoLayers(map);
    map.setView([center.lat, center.lng], 11);
    const empty = document.createElement("div");
    empty.className = "map-loading-overlay";
    empty.style.pointerEvents = "none";
    empty.innerHTML = `<div class="map-loading-card" style="font-weight:500;max-width:320px;text-align:center;line-height:1.45;">${
      state.results.length
        ? st("sales.map.noCoords","Leads found, but none have map coordinates yet.")
        : st("sales.map.empty","No coordinates to map. Run a search to see live leads on the map.")
    }</div>`;
    el.appendChild(empty);
    scheduleMapSizeFix(map, el);
    return;
  }

  const map = L.map(el, mapOpts);
  street.addTo(map);
  window._maps.push(map);
  window._leadMap = map;
  window._leadMapMarkers = {};
  L.control.layers(controlLayers).addTo(map);
  addSalesGeoLayers(map);

  if(state.mapLayers.heat && typeof L.heatLayer === "function"){
    const heatPts = mappable.map(row => {
      const w = Math.max(0.12, Math.min(1, (Number(row.lead.leadScore) || 0) / 100));
      return [row.lat, row.lng, w];
    });
    L.heatLayer(heatPts, { radius: 28, blur: 22, maxZoom: 16, minOpacity: 0.25 }).addTo(map);
  }

  const bounds = [];
  const markerById = {};
  let markerLayer;
  try {
    markerLayer = useCluster
      ? L.markerClusterGroup({
          maxClusterRadius: 48,
          spiderfyOnMaxZoom: true,
          showCoverageOnHover: false,
          disableClusteringAtZoom: 16,
        })
      : L.layerGroup();
  } catch (e) {
    markerLayer = L.layerGroup();
  }
  markerLayer.addTo(map);
  window._leadMapMarkerLayer = markerLayer;

  mappable.forEach(row => {
    const l = row.lead;
    const selected = state.mapFocusLeadId === l.id;
    const marker = L.circleMarker([row.lat, row.lng], leadMarkerStyle(l, selected));
    marker.bindPopup(leadMarkerPopupHtml(l), { maxWidth: 320, className: "lm-popup-wrap" });
    marker.bindTooltip(leadMarkerTooltipHtml(l), {
      direction: "top",
      offset: [0, -8],
      opacity: 0.95,
      className: "lm-marker-tip",
    });
    marker.on("click", ()=>{ window._focusLeadOnMap(l.id); });
    markerLayer.addLayer(marker);
    markerById[l.id] = marker;
    bounds.push([row.lat, row.lng]);
  });
  window._leadMapMarkers = markerById;

  if(state.mapLayers.office) bounds.push([SALES_OFFICE.lat, SALES_OFFICE.lng]);
  if(state.mapFocusLeadId && markerById[state.mapFocusLeadId]){
    const m = markerById[state.mapFocusLeadId];
    const openFocused = ()=>{
      try {
        syncLeadMarkerSelection(state.mapFocusLeadId);
        map.setView(m.getLatLng(), Math.max(map.getZoom(), 14));
        m.openPopup();
      } catch(e){}
    };
    if(useCluster && m.__parent && typeof m.__parent.zoomToShowLayer === "function"){
      setTimeout(()=>{ try { m.__parent.zoomToShowLayer(m, openFocused); } catch(e){ openFocused(); } }, 80);
    } else {
      setTimeout(openFocused, 80);
    }
  } else {
    map.fitBounds(bounds, { padding:[36,36], maxZoom:14 });
    syncLeadDistanceMeasure(null);
  }
  // Soft busy overlay when ZIP/radius search is in flight but prior markers remain.
  if(state.loading){
    const soft = document.createElement("div");
    soft.className = "map-loading-overlay is-soft";
    soft.setAttribute("aria-live","polite");
    soft.innerHTML = `<div class="map-loading-card">${st("sales.map.searching","Searching live leads near {zip}...", {zip: zipDisplayLabel(state.searchParams.zip)})}</div>`;
    el.appendChild(soft);
  } else {
    clearMapLoadingOverlays(el);
  }
  scheduleMapSizeFix(map, el);
  // Restore focus chip after remount (chip HTML is rebuilt empty).
  if(state.mapFocusLeadId){
    const focused = getLeadById(state.mapFocusLeadId);
    if(focused) updateLeadFocusChip(focused);
  }
}

        soft.className = "map-loading-overlay is-soft";
        soft.setAttribute("aria-live","polite");
        soft.innerHTML = `<div class="map-loading-card">${st("sales.map.searching","Searching live leads near {zip}...", {zip: zipDisplayLabel(state.searchParams.zip)})}</div>`;
        rm.appendChild(soft);
      } else {
        clearMapLoadingOverlays(rm);
      }
      // Layout can settle after SPA re-render; invalidate so tiles aren't stuck blank.
      requestAnimationFrame(() => {
        try { map.invalidateSize({ animate: false }); } catch(e){}
        setTimeout(() => { try { map.invalidateSize({ animate: false }); } catch(e){} }, 200);
      });
    }
  }

  const dm = document.getElementById("detail-map");
  if(dm && dm.dataset.lat){
    const lat = parseFloat(dm.dataset.lat), lng = parseFloat(dm.dataset.lng);
    const layers = baseLayers();
    const satLabel = st("sales.map.sat","Satellite");
    // Satellite by default on the detail page — you can SEE the actual roof.
    const map = L.map(dm, { ...mapOpts, layers:[layers[satLabel]] });
    window._maps.push(map);
    L.control.layers(layers).addTo(map);
    L.circleMarker([lat, lng], {
      radius:9, color:"#FFFFFF", weight:2,
      fillColor:markerFillColor({ priority: dm.dataset.priority, propertyType: dm.dataset.propertyType }), fillOpacity:0.95
    }).addTo(map);
    map.setView([lat, lng], 18);
    requestAnimationFrame(() => {
      try { map.invalidateSize({ animate: false }); } catch(e){}
    });
  }
}

const _renderBase = render;
render = function(){
  _renderBase();
  setupMaps();
  loadSourceStatus();
  applySalesChromeI18n();
};

async function applySalesChromeI18n(){
  if (!window.I18n) return;
  await window.I18n.init();
  const host = document.getElementById("salesLangHost");
  if (host) window.I18n.mountLangSwitch(host);
  const name = document.querySelector(".brand-name");
  if (name) name.textContent = st("sales.brandName","Premier Sales");
  document.getElementById("btnSalesLogout")?.addEventListener("click", async () => {
    try {
      await fetch("/api/auth/logout", { method: "POST", credentials: "include" });
    } catch (e) { /* ignore */ }
    location.href = "/login.html";
  });
}

async function loadSessionUser(){
  try {
    const res = await fetch("/api/auth/me", { credentials: "include" });
    if (!res.ok) return;
    const data = await res.json();
    if (data && data.authenticated && data.email) {
      state.sessionEmail = data.email;
      const emailEl = document.querySelector(".sidebar-foot-email");
      const av = document.querySelector(".avatar-dot");
      if (emailEl) {
        emailEl.textContent = data.email;
        emailEl.title = data.email;
      }
      if (av) av.textContent = data.email.slice(0, 2).toUpperCase();
    }
  } catch (e) { /* ignore */ }
}

window.addEventListener("premier:lang", () => {
  render();
});

// Initial load: fetch LIVE leads for the default search immediately — the
// map and stats should never sit on coordinate-less demo data. SAMPLE_LEADS
// only appears if the backend is unreachable (fetchLeadsForSearch fallback).
async function initialSearch(){
  state.loading = true;
  state.results = []; // don't flash coordinate-less demo data over the map
  render();
  try{
    const leads = await fetchLeadsForSearch(state.searchParams);
    state.results = leads;
    state.fetchedSearchKey = searchFetchKey();
    state.hasSearched = true;
  } finally {
    state.loading = false;
  }
  render();
}

render();
loadSessionUser().then(() => { if (state.sessionEmail) render(); });
initialSearch();
</script>
