<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premier Sales Developer Machine</title>
<link rel="icon" type="image/svg+xml" href="/assets/img/premier-logo.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://basemaps.cartocdn.com" crossorigin>
<link rel="dns-prefetch" href="https://server.arcgisonline.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
<style>
/* ============================================================================
   PREMIER SALES DEVELOPER MACHINE — DESIGN TOKENS
   Palette: Navy (primary), White, Gray scale, Light-blue accent
   Type: Inter (UI/body) + IBM Plex Mono (data/metrics — the "readout" signature)
   ============================================================================ */
:root{
  --navy-900:#0B2036;
  --navy-800:#0F2A43;
  --navy-700:#16344F;
  --navy-600:#1F4A6E;
  --blue-accent:#2E8BE6;
  --blue-accent-dark:#1D6FBF;
  --blue-soft:#EAF3FC;
  --gray-50:#F6F8FA;
  --gray-100:#EEF1F5;
  --gray-200:#E2E7EE;
  --gray-300:#CBD5E1;
  --gray-500:#64748B;
  --gray-700:#3B4657;
  --ink:#132436;
  --white:#FFFFFF;
  --hot:#D64545;
  --hot-bg:#FCEBEB;
  --warm:#C97A1F;
  --warm-bg:#FBF1E3;
  --cold:#5C7086;
  --cold-bg:#EDF1F5;
  --good:#2A8F6E;
  --good-bg:#E6F5EF;
  --radius-sm:6px;
  --radius-md:10px;
  --radius-lg:16px;
  --shadow-card:0 1px 2px rgba(15,42,67,0.06), 0 1px 8px rgba(15,42,67,0.05);
  --shadow-pop:0 12px 32px rgba(11,32,54,0.18);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:'Inter',system-ui,-apple-system,sans-serif;
  background:var(--gray-50);
  color:var(--ink);
  -webkit-font-smoothing:antialiased;
}
.mono{font-family:'IBM Plex Mono',ui-monospace,monospace; font-variant-numeric:tabular-nums;}
button{font-family:inherit; cursor:pointer;}
input,select,textarea{font-family:inherit;}
a{color:inherit;}

/* Scrollbar */
::-webkit-scrollbar{width:10px; height:10px;}
::-webkit-scrollbar-thumb{background:var(--gray-300); border-radius:8px;}
::-webkit-scrollbar-track{background:transparent;}


/* ---------- Confirm modal (CRM) ---------- */
.crm-modal-backdrop{
  position:fixed; inset:0; z-index:9000; background:rgba(11,32,54,0.55);
  display:flex; align-items:center; justify-content:center; padding:20px;
  backdrop-filter:blur(3px);
}
.crm-modal{
  width:min(440px,100%); background:var(--white); border-radius:var(--radius-lg);
  box-shadow:var(--shadow-pop); border:1px solid var(--gray-200); overflow:hidden;
}
.crm-modal-head{ padding:18px 20px 12px; border-bottom:1px solid var(--gray-100); }
.crm-modal-head h3{margin:0; font-size:16px; font-weight:700; color:var(--navy-900); letter-spacing:-0.01em;}
.crm-modal-head p{margin:6px 0 0; font-size:12.5px; color:var(--gray-500); line-height:1.45;}
.crm-modal-body{padding:14px 20px 6px; max-height:50vh; overflow:auto;}
.crm-kv{display:flex; justify-content:space-between; gap:12px; padding:8px 0; border-bottom:1px solid var(--gray-100); font-size:12.5px;}
.crm-kv:last-child{border-bottom:0;}
.crm-kv span{color:var(--gray-500); flex-shrink:0;}
.crm-kv b{color:var(--ink); text-align:right; font-weight:600; word-break:break-word;}
.crm-warn{
  margin:10px 0 4px; padding:10px 12px; border-radius:8px; background:var(--warm-bg);
  color:var(--warm); font-size:12px; line-height:1.45; border:1px solid #F3E0BE;
}
.crm-ok{
  margin:10px 0 4px; padding:10px 12px; border-radius:8px; background:var(--good-bg);
  color:var(--good); font-size:12px; line-height:1.45; border:1px solid #C9E9DB;
}
.crm-force-row{
  margin:12px 0 0; display:flex; align-items:flex-start; gap:8px;
  font-size:12.5px; color:var(--gray-700); line-height:1.4; cursor:pointer;
}
.crm-force-row input{margin-top:2px;}
.crm-badge{
  display:inline-flex; align-items:center; gap:5px; padding:2px 8px; border-radius:999px;
  font-size:10.5px; font-weight:700; letter-spacing:.02em; text-transform:uppercase;
  background:var(--good-bg); color:var(--good); border:1px solid #C9E9DB; white-space:nowrap;
}
.crm-badge a{color:inherit; text-decoration:none;}
.crm-badge a:hover{text-decoration:underline;}
.crm-modal-foot{
  display:flex; gap:8px; justify-content:flex-end; padding:14px 20px 18px;
  border-top:1px solid var(--gray-100); background:var(--gray-50);
}

/* ---------- App Shell ---------- */
#app{min-height:100vh; display:flex;}

.sidebar{
  width:232px; flex-shrink:0; background:var(--navy-900);
  color:var(--white); display:flex; flex-direction:column;
  position:sticky; top:0; height:100vh; padding:20px 14px;
}
.brand{padding:6px 10px 16px 10px; border-bottom:1px solid rgba(255,255,255,0.08); margin-bottom:12px;}
.brand-row{display:flex; align-items:center; gap:10px; margin-bottom:8px;}
.brand-logo{width:34px; height:34px; border-radius:8px; display:block; flex-shrink:0; background:var(--white); object-fit:contain; padding:3px;}
.brand-name{font-size:15px; font-weight:700; line-height:1.2; letter-spacing:-0.01em;}
.brand-sub{font-size:11px; color:rgba(255,255,255,0.45); margin-top:2px; text-transform:uppercase; letter-spacing:.06em;}
.brand-globals{
  display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-top:12px;
}
.sidebar .btn-home{
  display:inline-flex; align-items:center; gap:6px;
  padding:7px 12px; border-radius:8px;
  border:1px solid rgba(46,139,230,0.55);
  background:rgba(46,139,230,0.16);
  font-size:12.5px; font-weight:600; color:#fff;
  text-decoration:none; white-space:nowrap;
}
.sidebar .btn-home:hover{background:rgba(46,139,230,0.28); color:#fff;}
.sidebar .lang-flag-btn{
  width:36px; height:34px; padding:0; border-radius:8px; cursor:pointer;
  border:1px solid rgba(255,255,255,0.28); background:rgba(255,255,255,0.08);
  font-size:20px; line-height:1; color:#fff;
  display:inline-flex; align-items:center; justify-content:center;
}
.sidebar .lang-flag-btn:hover{border-color:rgba(255,255,255,0.55); background:rgba(255,255,255,0.14);}

.nav-group{margin-bottom:4px;}
.nav-label{font-size:10.5px; text-transform:uppercase; letter-spacing:.08em; color:rgba(255,255,255,0.35); padding:14px 10px 6px;}
.nav-item{
  display:flex; align-items:center; gap:10px; padding:9px 10px; border-radius:8px;
  font-size:13.5px; font-weight:500; color:rgba(255,255,255,0.72); margin-bottom:2px;
  border:none; background:transparent; width:100%; text-align:left; transition:background .12s, color .12s;
}
.nav-item:hover{background:rgba(255,255,255,0.06); color:var(--white);}
.nav-item.active{background:var(--blue-accent); color:var(--white); font-weight:600;}
.nav-icon{width:16px; height:16px; flex-shrink:0; opacity:.9;}
.nav-count{margin-left:auto; font-size:11px; font-family:'IBM Plex Mono',monospace; background:rgba(255,255,255,0.1); padding:1px 6px; border-radius:20px;}

.sidebar-foot{margin-top:auto; padding:14px 10px 8px; border-top:1px solid rgba(255,255,255,0.08);}
.sidebar-foot-user{display:flex; align-items:flex-start; gap:9px; font-size:12.5px; color:rgba(255,255,255,0.7); margin-bottom:10px;}
.avatar-dot{width:26px; height:26px; border-radius:50%; background:var(--navy-600); display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; color:var(--white); flex-shrink:0;}
.sidebar-foot-email{font-size:11.5px; color:rgba(255,255,255,0.55); word-break:break-all; line-height:1.35;}
.sidebar-foot-org{font-size:10.5px; color:rgba(255,255,255,0.35); margin-top:2px; text-transform:uppercase; letter-spacing:.04em;}
.sidebar .btn-logout{
  width:100%; justify-content:center;
  padding:7px 10px; border-radius:8px; font-size:12.5px; font-weight:600;
  border:1px solid rgba(255,255,255,0.2); background:rgba(255,255,255,0.06); color:rgba(255,255,255,0.85);
}
.sidebar .btn-logout:hover{background:rgba(255,255,255,0.12); color:#fff; border-color:rgba(255,255,255,0.35);}

.main{flex:1; min-width:0;}
.topbar{
  position:sticky; top:0; z-index:20; background:var(--white); border-bottom:1px solid var(--gray-200);
  padding:14px 28px; display:flex; align-items:center; justify-content:space-between;
}
.topbar h1{font-size:18px; margin:0; font-weight:700; letter-spacing:-0.01em;}
.topbar-sub{font-size:12.5px; color:var(--gray-500); margin-top:2px;}
.topbar-actions{display:flex; gap:8px;}

.content{padding:24px 28px 60px;}

/* ---------- Buttons ---------- */
.btn{
  display:inline-flex; align-items:center; gap:7px; font-size:13px; font-weight:600;
  padding:8px 14px; border-radius:8px; border:1px solid var(--gray-200); background:var(--white); color:var(--ink);
  transition:all .12s;
}
.btn:hover{border-color:var(--gray-300); background:var(--gray-50);}
.btn-primary{background:var(--navy-800); border-color:var(--navy-800); color:var(--white);}
.btn-primary:hover{background:var(--navy-700); border-color:var(--navy-700);}
.btn-accent{background:var(--blue-accent); border-color:var(--blue-accent); color:var(--white);}
.btn-accent:hover{background:var(--blue-accent-dark); border-color:var(--blue-accent-dark);}
.btn-sm{padding:6px 10px; font-size:12px;}
.btn-ghost{border-color:transparent; background:transparent;}
.btn-ghost:hover{background:var(--gray-100);}
.btn:disabled{opacity:.45; cursor:not-allowed;}

/* ---------- Cards / Panels ---------- */
.panel{background:var(--white); border:1px solid var(--gray-200); border-radius:var(--radius-lg); box-shadow:var(--shadow-card);}
.panel-pad{padding:20px 22px;}
.panel-title{font-size:14.5px; font-weight:700; margin:0 0 2px; letter-spacing:-0.005em;}
.panel-desc{font-size:12.5px; color:var(--gray-500); margin:0 0 16px;}

/* ---------- Dashboard stat cards ---------- */
.stat-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:22px;}
.stat-card{background:var(--white); border:1px solid var(--gray-200); border-radius:var(--radius-md); padding:16px 18px; box-shadow:var(--shadow-card);}
.stat-label{font-size:11.5px; color:var(--gray-500); font-weight:600; text-transform:uppercase; letter-spacing:.04em; margin-bottom:8px;}
.stat-value{font-size:26px; font-weight:700; font-family:'IBM Plex Mono',monospace; letter-spacing:-0.02em; color:var(--navy-900);}
.stat-value.accent{color:var(--blue-accent-dark);}
.stat-value.hot{color:var(--hot);}
.stat-value.warm{color:var(--warm);}
.stat-value.cold{color:var(--cold);}
.stat-foot{font-size:11.5px; color:var(--gray-500); margin-top:6px;}

/* ---------- Priority badges / score ---------- */
.badge{display:inline-flex; align-items:center; gap:5px; font-size:11px; font-weight:700; padding:3px 9px; border-radius:20px; text-transform:uppercase; letter-spacing:.03em;}
.badge-dot{width:6px; height:6px; border-radius:50%;}
.badge-hot{background:var(--hot-bg); color:var(--hot);}
.badge-hot .badge-dot{background:var(--hot);}
.badge-warm{background:var(--warm-bg); color:var(--warm);}
.badge-warm .badge-dot{background:var(--warm);}
.badge-cold{background:var(--cold-bg); color:var(--cold);}
.badge-cold .badge-dot{background:var(--cold);}

.score-pill{
  display:inline-flex; align-items:baseline; gap:3px; font-family:'IBM Plex Mono',monospace; font-weight:700;
  padding:4px 9px; border-radius:8px; font-size:14px;
}
.score-hot{background:var(--hot-bg); color:var(--hot);}
.score-warm{background:var(--warm-bg); color:var(--warm);}
.score-cold{background:var(--cold-bg); color:var(--cold);}
.score-pill .max{font-size:10px; font-weight:500; opacity:.65;}

.status-chip{font-size:11px; font-weight:600; padding:3px 9px; border-radius:6px; background:var(--gray-100); color:var(--gray-700); border:1px solid var(--gray-200);}
.status-New{background:var(--blue-soft); color:var(--blue-accent-dark); border-color:#CFE4FA;}
.status-Contacted{background:#F1EEFB; color:#6D4FC7; border-color:#E1DAF7;}
.status-Follow-up{background:var(--warm-bg); color:var(--warm); border-color:#F3E0BE;}
.status-Proposal{background:#E4F1FB; color:#1D6FBF; border-color:#CFE4FA;}
.status-Closed{background:var(--good-bg); color:var(--good); border-color:#C9E9DB;}
.status-Not{background:var(--gray-100); color:var(--gray-500); border-color:var(--gray-200);}

.risk-chip{font-size:11px; font-weight:700; padding:3px 8px; border-radius:6px;}
.risk-Severe{background:var(--hot-bg); color:var(--hot);}
.risk-High{background:#FDF0E4; color:#C55A11;}
.risk-Moderate{background:var(--warm-bg); color:var(--warm);}
.risk-Low{background:var(--good-bg); color:var(--good);}
.spc-chip{font-size:10.5px; font-weight:700; padding:2px 7px; border-radius:5px; border:1px solid transparent; white-space:nowrap;}
.spc-HIGH{background:#fce7ff; color:#a21caf; border-color:#f0abfc;}
.spc-MDT{background:#fee2e2; color:#b91c1c; border-color:#fecaca;}
.spc-ENH{background:#ffedd5; color:#c2410c; border-color:#fdba74;}
.spc-SLGT{background:#fef9c3; color:#a16207; border-color:#fde047;}
.spc-MRGL{background:#dcfce7; color:#15803d; border-color:#86efac;}
.spc-TSTM{background:#ecfdf5; color:#047857; border-color:#a7f3d0;}
.ss-chip{font-size:10.5px; font-weight:700; padding:2px 7px; border-radius:5px; background:#eef2ff; color:#3730a3; border:1px solid #c7d2fe;}
.ss-chip.campaign{background:#fef2f2; color:#b91c1c; border-color:#fecaca;}
.ss-chip.review{background:#fff7ed; color:#c2410c; border-color:#fed7aa;}
.lm-sw.spc-poly{background:rgba(255,160,102,0.35); border:1.5px dashed #ffa366; border-radius:2px;}
.lm-sw.nws-ext{background:#7c0a02;}
.lm-sw.nws-sev{background:#e63900;}
.lm-sw.nws-mod{background:#ff9100;}
.lm-sw.nws-min{background:#ffd000;}
.lm-sw.nws-unk{background:#3aa0ff;}
.lm-sw.spc-tstm{background:#c1e9c1;}
.lm-sw.spc-mrgl{background:#66a366;}
.lm-sw.spc-slgt{background:#ffe066;}
.lm-sw.spc-enh{background:#ffa366;}
.lm-sw.spc-mdt{background:#ff6666;}
.lm-sw.spc-high{background:#ff66ff;}
.lm-sw.hail-lt{background:#3aa0ff; border-radius:2px;}
.lm-sw.hail-1{background:#ffd000; border-radius:2px;}
.lm-sw.hail-175{background:#ff9100; border-radius:2px;}
.lm-sw.hail-25{background:#e63900; border-radius:2px;}
.lm-sw.hailfc-5{background:#8b4726;}
.lm-sw.hailfc-15{background:#ffc800;}
.lm-sw.hailfc-30{background:#ff0000;}
.lm-sw.hailfc-45{background:#ff00ff;}
.lm-sw.hailfc-60{background:#912cee;}
.lm-sw.ss-high{background:#c1121f; border-radius:50%;}
.lm-sw.ss-review{background:#e85d04; border-radius:50%;}
.lm-sw.ss-info{background:#ffd000; border-radius:50%;}
.lm-layer-toggles .lm-toggle-group{margin-top:4px; padding-top:8px; border-top:1px solid var(--gray-100); display:flex; flex-direction:column; gap:8px;}
.lm-layer-toggles .lm-toggle-group:first-of-type{border-top:none; padding-top:0; margin-top:0;}
.lm-layer-toggles .lm-toggle-label{
  font-size:10.5px; font-weight:700; text-transform:uppercase; letter-spacing:.05em;
  color:var(--gray-500); margin:2px 0 0;
}

/* ---------- Search Panel ---------- */
.search-grid{display:grid; grid-template-columns:200px 200px 1fr; gap:18px; margin-bottom:18px;}
.field-label{font-size:12px; font-weight:600; color:var(--gray-700); margin-bottom:6px; display:block;}
.field-hint{font-size:11px; color:var(--gray-500); margin-top:5px;}
.input, select.input{
  width:100%; padding:9px 11px; border:1px solid var(--gray-300); border-radius:8px; font-size:13.5px; background:var(--white); color:var(--ink);
}
.input:focus, select.input:focus{outline:none; border-color:var(--blue-accent); box-shadow:0 0 0 3px var(--blue-soft);}
.radius-group{display:flex; gap:8px;}
.radius-opt{
  flex:1; text-align:center; padding:9px 6px; border:1px solid var(--gray-300); border-radius:8px; font-size:13px; font-weight:600;
  background:var(--white); color:var(--gray-700); transition:all .12s;
}
.radius-opt.selected{background:var(--navy-800); border-color:var(--navy-800); color:var(--white);}
.chip-select{display:flex; flex-wrap:wrap; gap:8px;}
.type-chip{
  padding:7px 12px 7px 10px; border:1px solid var(--gray-300); border-radius:20px; font-size:12.5px; font-weight:600; background:var(--white); color:var(--gray-700);
  display:flex; align-items:center; gap:7px; transition:all .12s;
  border-left:3px solid var(--type-color, var(--gray-300));
}
.type-chip .type-swatch{
  width:8px; height:8px; border-radius:50%; flex-shrink:0;
  background:var(--type-color, var(--gray-300));
  box-shadow:0 0 0 1px rgba(11,32,54,0.08);
}
.type-chip.selected{
  background:var(--blue-soft); border-color:var(--type-color, var(--blue-accent));
  border-left-color:var(--type-color, var(--blue-accent)); color:var(--navy-800);
}
.filter-row{display:grid; grid-template-columns:repeat(3,1fr); gap:16px; padding-top:16px; margin-top:16px; border-top:1px solid var(--gray-100);}
.map-color-toggle{display:inline-flex; border:1px solid var(--gray-300); border-radius:8px; overflow:hidden; vertical-align:middle;}
.map-color-toggle button{
  padding:5px 10px; font-size:11.5px; font-weight:600; border:none; background:var(--white); color:var(--gray-500);
}
.map-color-toggle button.active{background:var(--navy-800); color:var(--white);}
.map-legend .legend-types{display:flex; flex-wrap:wrap; gap:10px 14px; align-items:center;}
.map-legend-tools{display:flex; align-items:center; gap:10px; margin-left:auto; flex-wrap:wrap;}

/* ---------- Results toolbar ---------- */
.results-toolbar{display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; flex-wrap:wrap; gap:10px;}
.view-toggle{display:flex; border:1px solid var(--gray-300); border-radius:8px; overflow:hidden;}
.view-toggle button{padding:7px 13px; font-size:12.5px; font-weight:600; border:none; background:var(--white); color:var(--gray-500);}
.view-toggle button.active{background:var(--navy-800); color:var(--white);}
.sort-select{display:flex; align-items:center; gap:8px; flex-wrap:wrap; font-size:12.5px; color:var(--gray-500);}
.sort-dir-btn{min-width:72px; justify-content:center;}

/* ---------- Table view ---------- */
.lead-table{width:100%; border-collapse:collapse; font-size:13px;}
.lead-table thead th{
  text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:.04em; color:var(--gray-500);
  font-weight:700; padding:10px 12px; border-bottom:1px solid var(--gray-200); background:var(--gray-50); position:sticky; top:0;
}
.lead-table tbody tr{border-bottom:1px solid var(--gray-100); cursor:pointer; transition:background .1s;}
.lead-table tbody tr:hover{background:var(--blue-soft);}
.lead-table td{padding:11px 12px; vertical-align:middle;}
.lt-name{font-weight:600; color:var(--ink);}
.lt-sub{font-size:11.5px; color:var(--gray-500); margin-top:1px;}
.table-wrap{overflow-x:auto; border-radius:var(--radius-lg);}

/* ---------- Card grid ---------- */
.lead-grid{display:grid; grid-template-columns:repeat(auto-fill, minmax(340px, 1fr)); gap:16px;}
.lead-card{background:var(--white); border:1px solid var(--gray-200); border-radius:var(--radius-lg); box-shadow:var(--shadow-card); padding:18px; cursor:pointer; transition:transform .12s, box-shadow .12s;}
.lead-card:hover{transform:translateY(-2px); box-shadow:0 8px 24px rgba(15,42,67,0.12);}
.lc-head{display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:10px;}
.lc-name{font-size:15px; font-weight:700; margin:0 0 3px; letter-spacing:-0.005em;}
.lc-addr{font-size:12px; color:var(--gray-500);}
.lc-type-tag{
  display:inline-flex; align-items:center; gap:6px; font-size:10.5px; font-weight:700; text-transform:uppercase; letter-spacing:.03em;
  color:var(--ink); background:var(--gray-50); padding:2px 8px 2px 7px; border-radius:5px; margin-top:8px;
  border:1px solid var(--gray-200); border-left:3px solid var(--type-color, var(--blue-accent));
}
.lc-type-tag::before{
  content:""; width:7px; height:7px; border-radius:50%; background:var(--type-color, var(--blue-accent)); flex-shrink:0;
}
.lc-grid{display:grid; grid-template-columns:1fr 1fr; gap:9px 14px; margin:14px 0; padding:12px 0; border-top:1px solid var(--gray-100); border-bottom:1px solid var(--gray-100);}
.lc-metric-label{font-size:10.5px; color:var(--gray-500); text-transform:uppercase; letter-spacing:.03em;}
.lc-metric-value{font-size:13px; font-weight:600; font-family:'IBM Plex Mono',monospace; margin-top:2px;}
.lc-reason{font-size:12px; color:var(--gray-700); line-height:1.5; margin-bottom:12px;}
.lc-foot{display:flex; align-items:center; justify-content:space-between;}

/* ---------- Detail page ---------- */
.detail-header{display:flex; justify-content:space-between; align-items:flex-start; gap:20px; margin-bottom:20px;}
.detail-grid{display:grid; grid-template-columns:1.4fr 1fr; gap:20px;}
.info-row{display:flex; justify-content:space-between; padding:9px 0; border-bottom:1px solid var(--gray-100); font-size:13px;}
.info-row:last-child{border-bottom:none;}
.info-label{color:var(--gray-500); font-size:12.5px;}
.info-value{font-weight:600; text-align:right; font-family:'IBM Plex Mono',monospace; font-size:12.8px;}
.timeline{list-style:none; margin:0; padding:0;}
.timeline li{display:flex; gap:12px; padding:10px 0; border-bottom:1px solid var(--gray-100);}
.timeline li:last-child{border-bottom:none;}
.tl-dot{width:9px; height:9px; border-radius:50%; margin-top:5px; flex-shrink:0;}
.tl-date{font-size:11px; font-family:'IBM Plex Mono',monospace; color:var(--gray-500); min-width:78px;}
.tl-text{font-size:12.8px; color:var(--ink);}
.tl-sub{font-size:11.5px; color:var(--gray-500);}
.ai-box{background:var(--blue-soft); border:1px solid #CFE4FA; border-radius:var(--radius-md); padding:14px 16px; margin-bottom:12px;}
.ai-box-label{font-size:10.5px; font-weight:700; text-transform:uppercase; letter-spacing:.04em; color:var(--blue-accent-dark); margin-bottom:6px; display:flex; align-items:center; gap:6px;}
.ai-box p{margin:0; font-size:13px; line-height:1.55; color:var(--ink);}
.email-draft{background:var(--gray-50); border:1px solid var(--gray-200); border-radius:var(--radius-md); padding:14px 16px; font-size:12.8px; line-height:1.6; white-space:pre-wrap; font-family:'IBM Plex Mono',monospace; color:var(--ink);}
textarea.notes{width:100%; min-height:90px; border:1px solid var(--gray-300); border-radius:8px; padding:10px 12px; font-size:13px; resize:vertical;}

.section-gap{margin-bottom:20px;}
.tag-pill{font-size:11px; font-weight:600; background:var(--gray-100); color:var(--gray-700); padding:3px 9px; border-radius:6px; display:inline-block;}

/* API placeholder note strip */
.api-note{
  display:flex; align-items:flex-start; gap:9px; background:#FBFBFD; border:1px dashed var(--gray-300); border-radius:8px;
  padding:9px 12px; font-size:11.5px; color:var(--gray-500); margin-top:16px;
}
.api-note b{color:var(--gray-700);}

.empty-state{text-align:center; padding:60px 20px; color:var(--gray-500);}
.empty-state h3{color:var(--ink); font-size:15px; margin-bottom:6px;}

.toast{
  position:fixed; bottom:22px; right:22px; background:var(--navy-900); color:var(--white); padding:12px 18px; border-radius:10px;
  font-size:13px; font-weight:500; box-shadow:var(--shadow-pop); z-index:9001; display:flex; align-items:center; gap:10px;
  transform:translateY(20px); opacity:0; transition:all .25s; pointer-events:none; max-width:min(420px, calc(100vw - 40px));
  line-height:1.45;
}
.toast.show{transform:translateY(0); opacity:1;}
.toast.toast-interactive{pointer-events:auto;}
.toast a{color:#7dd3fc; font-weight:700; text-decoration:underline; text-underline-offset:2px;}
.toast a:hover{color:#bae6fd;}

.checkbox-row{display:flex; align-items:center; gap:8px; font-size:13px; color:var(--gray-700);}

/* ---------- Dashboard redesign ---------- */
.dash-search{display:grid; grid-template-columns:minmax(240px,1.35fr) 180px 1fr; gap:16px; align-items:start;}
.dash-search.has-status{grid-template-columns:minmax(240px,1.35fr) 180px 1fr minmax(140px,180px);}
.search-status-field[hidden]{display:none !important;}
.search-status{
  font-size:12px; color:var(--gray-500); line-height:1.35; padding:28px 0 0;
}
.search-status[hidden]{display:none !important;}
.search-status.is-loading{
  color:var(--blue-accent-dark); font-weight:600;
  display:flex; align-items:center; gap:7px;
}
.search-status.is-loading::before{
  content:""; width:8px; height:8px; border-radius:50%; flex-shrink:0;
  background:var(--blue-accent); animation:search-pulse 1s ease-in-out infinite;
}
@keyframes search-pulse{
  0%,100%{ opacity:1; transform:scale(1); }
  50%{ opacity:0.35; transform:scale(0.8); }
}
.zip-combo.is-search-busy .zip-combo-search,
.radius-group.is-search-busy .radius-opt:not(.selected){
  opacity:0.85;
}
.zip-combo{position:relative; width:100%; min-width:0;}
.zip-combo-field{position:relative;}
.zip-combo-search{width:100%; font-size:12.5px; padding-right:28px;}
.zip-combo-caret{position:absolute; right:10px; top:50%; transform:translateY(-50%); pointer-events:none; color:var(--gray-500); font-size:10px; line-height:1;}
.zip-combo-list{
  position:absolute; left:0; right:0; top:calc(100% + 4px); z-index:40;
  max-height:280px; overflow:auto; background:var(--white); border:1px solid var(--gray-200);
  border-radius:10px; box-shadow:var(--shadow-pop); padding:4px;
}
.zip-combo-list[hidden]{display:none !important;}
.zip-opt{
  display:flex; align-items:center; gap:8px; width:100%; text-align:left; border:1px solid transparent; background:transparent; cursor:pointer;
  padding:8px 10px; border-radius:8px; font-size:12.5px; color:var(--ink); line-height:1.35;
}
.zip-opt:hover, .zip-opt.active{background:var(--blue-soft);}
.zip-opt.selected{
  background:var(--blue-soft); border-color:var(--blue-accent); color:var(--blue-accent-dark); font-weight:700;
}
.zip-opt.selected:hover, .zip-opt.selected.active{
  background:#CFE4FA; border-color:var(--blue-accent);
}
.zip-opt.special{font-weight:600; color:var(--blue-accent-dark);}
.zip-opt.special.selected{font-weight:700;}
.zip-opt-check{flex:0 0 auto; width:12px; font-size:12px; line-height:1; color:var(--blue-accent); font-weight:800;}
.zip-opt:not(.selected) .zip-opt-check{visibility:hidden;}
.zip-opt-label{flex:1; min-width:0;}
.zip-opt-group{font-size:10px; font-weight:800; letter-spacing:.06em; text-transform:uppercase; color:var(--gray-500); padding:8px 10px 4px;}
.zip-combo-empty{padding:10px; font-size:12px; color:var(--gray-500);}
.zip-hint{font-size:11px; color:var(--gray-500); margin-top:6px; line-height:1.35;}
.dash-main{display:grid; grid-template-columns:1.75fr 1fr; gap:16px; margin-bottom:20px;}
.top-lead-list{display:flex; flex-direction:column; overflow-y:auto; max-height:400px; margin:4px 0 12px;}
.top-lead{display:flex; justify-content:space-between; align-items:center; gap:10px; padding:9px 8px; border-bottom:1px solid var(--gray-100); cursor:pointer; border-radius:8px; transition:background .1s;}
.top-lead:hover{background:var(--blue-soft);}
.top-lead .tl2-name{font-size:12.8px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:190px;}
.top-lead .tl2-meta{font-size:11px; color:var(--gray-500); margin-top:1px;}
.status-chips{display:flex; flex-wrap:wrap; gap:8px;}
.src-chip{font-size:11.5px; font-weight:600; padding:4px 11px; border-radius:20px; display:inline-flex; align-items:center; gap:5px;}
.src-live{background:var(--good-bg); color:var(--good);}
.src-stub{background:var(--gray-100); color:var(--gray-500);}
.results-filters{display:flex; gap:20px; align-items:center; flex-wrap:wrap; padding:11px 16px; background:var(--white); border:1px solid var(--gray-200); border-radius:var(--radius-md); margin-bottom:14px; font-size:12.5px; color:var(--gray-700);}
@media (max-width: 1100px){ .dash-search{grid-template-columns:1fr 1fr;} .dash-main{grid-template-columns:1fr;} }

/* ---------- Owner groups (portfolio view) ---------- */
.owner-group{margin-bottom:12px; overflow:hidden;}
.og-head{display:flex; justify-content:space-between; align-items:center; gap:14px; padding:14px 18px; cursor:pointer; transition:background .1s;}
.og-head:hover{background:var(--blue-soft);}
.og-name{font-size:14.5px; font-weight:700; letter-spacing:-0.005em;}
.og-meta{font-size:12px; color:var(--gray-500); margin-top:3px;}
.og-phone{font-size:12.5px; font-weight:600; color:var(--blue-accent-dark); font-family:'IBM Plex Mono',monospace; text-decoration:none;}
.og-badge{font-size:10px; font-weight:800; letter-spacing:.05em; padding:3px 9px; border-radius:20px; background:var(--blue-soft); color:var(--blue-accent-dark);}
.og-leads{border-top:1px solid var(--gray-100);}
.og-lead{display:grid; grid-template-columns:1fr 110px 64px 96px; gap:12px; align-items:center; padding:9px 18px; cursor:pointer; border-bottom:1px solid var(--gray-100); font-size:12.5px; transition:background .1s;}
.og-lead:last-child{border-bottom:none;}
.og-lead:hover{background:var(--gray-50);}
.og-addr{white-space:nowrap; overflow:hidden; text-overflow:ellipsis; color:var(--gray-700);}
@media (max-width: 780px){ .og-lead{grid-template-columns:1fr 80px;} }

/* ---------- Map ---------- */
.map-wrap{height:380px; position:relative;}
#detail-map{height:250px; border-radius:var(--radius-md); overflow:hidden; margin-top:14px; border:1px solid var(--gray-200);}
.map-empty{display:flex; align-items:center; justify-content:center; height:100%; color:var(--gray-500); font-size:12.5px; background:var(--gray-50); text-align:center; padding:0 30px;}
.data-banner{
  margin:0 0 12px; padding:10px 12px; border-radius:10px; font-size:12.5px; line-height:1.45;
  border:1px solid var(--gray-200);
}
.data-banner-warn{background:var(--warm-bg); color:#8A5A12; border-color:#F3E0BE;}
.data-banner-info{background:var(--blue-soft); color:var(--navy-700); border-color:#CFE4FA;}
.map-loading-overlay{
  position:absolute; inset:0; z-index:500; display:flex; align-items:center; justify-content:center;
  background:rgba(246,248,250,0.45); pointer-events:none;
}
.map-loading-overlay.is-soft{
  background:rgba(11,32,54,0.18);
  transition:opacity .15s ease;
}
.map-loading-card{
  background:#fff; color:#0B2036; font-size:13px; font-weight:600;
  padding:10px 16px; border-radius:10px; box-shadow:var(--shadow-pop);
  border:1px solid var(--gray-200);
  display:inline-flex; align-items:center; gap:8px;
}
.map-loading-overlay.is-soft .map-loading-card::before,
.map-loading-overlay.is-fetching .map-loading-card::before{
  content:""; width:10px; height:10px; border-radius:50%; flex-shrink:0;
  background:var(--blue-accent); animation:search-pulse 1s ease-in-out infinite;
}
.map-legend{display:flex; gap:14px; align-items:center; font-size:11.5px; color:var(--gray-500); padding:10px 16px; border-top:1px solid var(--gray-100); flex-wrap:wrap; row-gap:8px;}
.legend-dot{width:9px; height:9px; border-radius:50%; display:inline-block; margin-right:5px; vertical-align:middle;}
.leaflet-container{font-family:'Inter',system-ui,sans-serif; z-index:1; background:var(--gray-100);}
.leaflet-popup-content-wrapper{border-radius:10px;}

/* ---------- Lead Map (Sky-inspired layout, Sales layers only) ---------- */
/* Lock map view to the viewport so legend/list scroll internally and the map stays put. */
.main.view-map{
  display:flex; flex-direction:column; height:100vh; min-height:0; overflow:hidden;
}
.main.view-map .content{
  flex:1; min-height:0; overflow:hidden; display:flex; flex-direction:column;
  padding:14px 16px 16px;
}
.lead-map-page{
  display:flex; flex-direction:column; gap:12px;
  flex:1; min-height:0; overflow:hidden;
}
.lead-map-page > .data-banner{flex-shrink:0;}
.lead-map-toolbar{
  display:flex; flex-wrap:wrap; align-items:flex-end; gap:12px 16px;
  background:var(--white); border:1px solid var(--gray-200); border-radius:var(--radius-md);
  padding:12px 14px; box-shadow:var(--shadow-card); flex-shrink:0;
}
.lead-map-toolbar .lm-field{min-width:0;}
.lead-map-toolbar .lm-field-zip{flex:1.2; min-width:200px;}
.lead-map-toolbar .lm-field-radius{width:170px;}
.lead-map-toolbar .lm-field-filters{display:flex; flex-wrap:wrap; align-items:center; gap:12px; flex:1; min-width:220px;}
.lead-map-toolbar .lm-field-actions{display:flex; flex-direction:column; align-items:flex-end; gap:6px; margin-left:auto;}
.lead-map-toolbar .lm-field-actions .search-status{padding:0; text-align:right;}
.lead-map-toolbar .lm-field-actions .search-status.is-loading{justify-content:flex-end;}
.lead-map-count{font-size:12.5px; color:var(--gray-500); font-family:'IBM Plex Mono',monospace; white-space:nowrap;}
.lead-map-layout{
  display:grid; grid-template-columns:220px minmax(0,1fr) 300px; gap:12px;
  flex:1; min-height:0; overflow:hidden; align-items:stretch;
}
.lead-map-rail{
  background:var(--white); border:1px solid var(--gray-200); border-radius:var(--radius-lg);
  box-shadow:var(--shadow-card); padding:14px 14px 12px; display:flex; flex-direction:column;
  min-height:0; overflow:hidden;
}
.lead-map-rail h2{margin:0 0 2px; font-size:14px; font-weight:700; letter-spacing:-0.01em; color:var(--navy-900); flex-shrink:0;}
.lead-map-rail .rail-hint{margin:0 0 12px; font-size:11.5px; color:var(--gray-500); line-height:1.4; flex-shrink:0;}
.lead-map-rail-right > .sort-select{flex-shrink:0;}
.lead-map-legend{flex:1; min-height:0; overflow-y:auto; padding-right:2px;}
.lead-map-legend h4{
  margin:14px 0 6px; font-size:10.5px; font-weight:700; text-transform:uppercase;
  letter-spacing:.05em; color:var(--gray-500);
}
.lead-map-legend h4:first-child{margin-top:0;}
.lm-row{display:flex; align-items:center; gap:8px; margin:5px 0; font-size:12.5px; color:var(--ink);}
.lm-sw{width:12px; height:12px; border-radius:3px; flex-shrink:0; display:inline-block; border:1px solid rgba(11,32,54,0.08);}
.lm-sw.round{border-radius:50%;}
.lm-sw.ring{background:transparent; border:2px solid var(--blue-accent); border-radius:50%; width:12px; height:12px; box-sizing:border-box;}
.lm-sw.office{background:var(--navy-800); border-radius:50%; box-shadow:0 0 0 3px rgba(46,139,230,0.28);}
.lm-sw.office-pin{background:transparent; border:none; box-shadow:none; width:auto; height:auto; font-size:14px; line-height:1;}
.lm-layer-toggles{margin-top:12px; padding-top:12px; border-top:1px solid var(--gray-100); display:flex; flex-direction:column; gap:8px; flex-shrink:0;}
.lm-layer-toggles label{font-size:12.5px; color:var(--gray-700); display:flex; align-items:center; gap:8px; cursor:pointer;}
.lm-color-by{display:flex; flex-direction:column; gap:6px; margin-bottom:4px;}
.lm-color-by-label{font-size:10.5px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; color:var(--gray-500);}
.lm-color-by .map-color-toggle{width:100%;}
.lm-color-by .map-color-toggle button{flex:1;}
.checkbox-row.storm-stubbed{opacity:0.72; cursor:not-allowed;}
.checkbox-row.storm-stubbed input{cursor:not-allowed;}
.stub-pill{
  display:inline-block; margin-left:6px; padding:1px 7px; border-radius:999px;
  font-size:10px; font-weight:700; letter-spacing:.02em; text-transform:uppercase;
  background:var(--gray-100); color:var(--gray-500); border:1px solid var(--gray-200);
}
.lm-lead-actions{display:flex; flex-wrap:wrap; gap:4px; margin-left:auto;}
.lm-lead-actions .btn{padding:3px 8px; font-size:11.5px;}
.marker-cluster-small, .marker-cluster-medium, .marker-cluster-large{
  background-color:rgba(46,139,230,0.22);
}
.marker-cluster-small div, .marker-cluster-medium div, .marker-cluster-large div{
  background-color:rgba(15,42,67,0.88); color:#fff; font-family:'IBM Plex Mono',monospace; font-weight:600;
}
.lead-map-center{
  min-width:0; min-height:240px; height:100%;
  background:var(--white); border:1px solid var(--gray-200); border-radius:var(--radius-lg);
  box-shadow:var(--shadow-card); overflow:hidden; position:relative;
}
/* Absolute fill inside the grid cell — flex height:100% often leaves Leaflet at 0×0
   (controls still paint; tiles + SVG markers stay blank). */
#lead-map{
  position:absolute; inset:0; width:100%; height:100%; min-height:240px;
  z-index:1; background:var(--gray-100);
}
.lm-focus-chip{
  position:absolute; left:12px; bottom:12px; z-index:500;
  max-width:min(340px, calc(100% - 24px));
  background:rgba(255,255,255,0.96); border:1px solid var(--gray-200);
  border-radius:10px; box-shadow:var(--shadow-card); padding:10px 12px;
  pointer-events:none;
}
.lm-focus-chip[hidden]{display:none !important;}
.lm-focus-chip-label{font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.04em; color:var(--gray-500); margin-bottom:2px;}
.lm-focus-chip-name{font-size:13px; font-weight:700; color:var(--navy-900); line-height:1.25;}
.lm-focus-chip-meta{font-size:11.5px; color:var(--gray-600); margin-top:4px; line-height:1.4;}
.lm-focus-chip-dist{font-family:'IBM Plex Mono',monospace; font-weight:600; color:var(--navy-800);}
.lead-map-list{flex:1; min-height:0; overflow-y:auto; overscroll-behavior:contain; margin:0 -4px; padding:0 4px;}
.lm-lead{
  display:grid; grid-template-columns:auto 1fr auto; gap:6px 10px; padding:10px 10px;
  border-radius:10px; border:1px solid transparent; cursor:pointer; transition:background .1s, border-color .1s;
  margin-bottom:4px;
}
.lm-lead:hover{background:var(--blue-soft);}
.lm-lead.active{background:var(--blue-soft); border-color:#CFE4FA; box-shadow:inset 3px 0 0 var(--blue-accent);}
.lm-lead-swatch{
  width:10px; height:10px; border-radius:50%; margin-top:4px;
  border:1.5px solid #fff; box-shadow:0 0 0 1px rgba(11,32,54,0.18); flex-shrink:0;
}
.lm-lead-name{font-size:12.8px; font-weight:650; color:var(--ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.lm-lead-addr{font-size:11px; color:var(--gray-500); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:1px;}
.lm-lead-meta{display:flex; flex-wrap:wrap; align-items:center; gap:6px; grid-column:1 / -1;}
.lm-lead-owner{font-size:11px; color:var(--gray-500); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.lm-lead-dist{
  font-size:11px; font-family:'IBM Plex Mono',monospace; font-weight:600;
  color:var(--navy-800); white-space:nowrap; align-self:start; margin-top:2px;
}
.lm-empty{
  text-align:center; padding:40px 16px; color:var(--gray-500); font-size:12.5px; line-height:1.5;
}
.lm-empty h3{margin:0 0 6px; font-size:14px; color:var(--ink);}
/* Sky-style lead popup (jn-popup parity, Sales fields) */
.lm-popup{min-width:220px; max-width:300px;}
.lm-popup-name{font-weight:700; font-size:14px; color:var(--navy-900); line-height:1.25;}
.lm-popup-sub{font-size:12px; color:var(--gray-600); margin-top:2px;}
.lm-popup-badges{display:flex; flex-wrap:wrap; gap:6px; margin-top:8px; align-items:center;}
.lm-popup-type{
  font-size:10px; font-weight:700; padding:2px 8px; border-radius:999px; color:#fff;
}
.lm-popup-addr{font-size:12px; color:var(--gray-600); margin-top:8px; line-height:1.4;}
.lm-popup-grid{
  display:grid; grid-template-columns:1fr 1fr; gap:6px 10px; margin-top:10px;
  padding-top:8px; border-top:1px solid var(--gray-100);
}
.lm-popup-kv{min-width:0;}
.lm-popup-k{font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.04em; color:var(--gray-500);}
.lm-popup-v{font-size:12.5px; font-weight:650; color:var(--navy-900); margin-top:1px; font-family:'IBM Plex Mono',monospace;}
.lm-popup-v.plain{font-family:inherit; font-weight:600;}
.lm-popup-note{font-size:11px; color:var(--warm); margin-top:6px;}
.lm-popup-actions{display:flex; flex-wrap:wrap; gap:10px; margin-top:10px;}
.lm-popup-actions a{color:#1D6FBF; font-weight:600; font-size:12px; text-decoration:none;}
.lm-popup-actions a:hover{text-decoration:underline;}
.office-pin{background:transparent; border:none;}
.office-pin-inner{font-size:22px; line-height:22px; filter:drop-shadow(0 1px 2px rgba(0,0,0,.45));}
/* iconSize [0,0] clips the pill unless overflow is visible — was white text
   spilling past a tiny navy chip onto the light basemap (unreadable). */
.lm-dist-label-wrap{
  background:transparent !important; border:none !important;
  overflow:visible !important; width:0 !important; height:0 !important;
}
.lm-dist-label{

// ---------------------------------------------------------------------------
// LIVE — building footprint / parcel data, proxied through our backend.
// The browser no longer calls third-party GIS APIs directly (CORS + rate
// limits). See server/sources/* for per-county implementations:
//   Chicago → Socrata syp8-uezg (building footprints — corrected dataset;
//             the old hz9b-7nh8 was a map view that silently returned [])
//   DuPage  → ParcelsWithRealEstateCC (parcels + assessor: owner, values)
//   Cook    → buildingFootprint_2008 (live, with local-extract fallback)
//   Non-IL  → Regrid stub (needs API key)
// ZIP → coordinates/county routing now uses REAL geocoding server-side
// (/api/geocode: Google when key is set, free fallback otherwise) — the old
// hardcoded DEMO_ZIP_COUNTY_MAP / DEMO_ZIP_COORDS tables are gone.
// ---------------------------------------------------------------------------
const ALL_TYPES = ["Commercial","Multifamily","Retail","Industrial","Office","HOA/Condo","Mixed-use"];
/** Fixed palette for property-type chips + map markers (light basemap friendly). */
const PROPERTY_TYPE_COLORS = {
  "Commercial":  "#1F4A6E", // navy
  "Multifamily": "#2A8F6E", // teal-green
  "Retail":      "#C97A1F", // amber
  "Industrial":  "#5C7086", // slate
  "Office":      "#2E8BE6", // blue accent
  "HOA/Condo":   "#B45309", // copper
  "Mixed-use":   "#0F766E", // deep teal
};
const PROPERTY_TYPE_COLOR_FALLBACK = "#5C7086";

function propertyTypeColor(type){
  return PROPERTY_TYPE_COLORS[type] || PROPERTY_TYPE_COLOR_FALLBACK;
}

function typeChipHtml(t, selected){
  const color = propertyTypeColor(t);
  return `<button type="button" class="type-chip ${selected?"selected":""}" data-type-toggle="${t}" style="--type-color:${color}"><span class="type-swatch" aria-hidden="true"></span>${selected?"✓ ":""}${t}</button>`;
}

function mapColorModeToggleHtml(extraClass){
  const mode = state.mapColorBy === "priority" ? "priority" : "type";
  return `<div class="map-color-toggle${extraClass ? " "+extraClass : ""}" role="group" aria-label="${st("sales.map.colorBy","Color markers by")}">
    <button type="button" class="${mode==="type"?"active":""}" data-map-color-by="type">${st("sales.map.colorByType","Type")}</button>
    <button type="button" class="${mode==="priority"?"active":""}" data-map-color-by="priority">${st("sales.map.colorByPriority","Priority")}</button>
  </div>`;
}

function mapMarkerLegendHtml(compact){
  if(state.mapColorBy === "priority"){
    return `
      <span><span class="legend-dot" style="background:var(--hot)"></span>${st("sales.map.hot","Hot")}</span>
      <span><span class="legend-dot" style="background:var(--warm)"></span>${st("sales.map.warm","Warm")}</span>
      <span><span class="legend-dot" style="background:var(--cold)"></span>${st("sales.map.cold","Cold")}</span>`;
  }
  const items = ALL_TYPES.map(t =>
    `<span><span class="legend-dot" style="background:${propertyTypeColor(t)}"></span>${t}</span>`
  ).join("");
  return compact ? `<span class="legend-types">${items}</span>` : items;
}

async function fetchBuildingFootprint(zip, radiusMiles){
  try{
    const res = await fetch(`/api/footprints?zip=${encodeURIComponent(zip)}&radius=${radiusMiles||10}`, {credentials:"include"});
    const data = await res.json();
    if(!res.ok) return { sourceUsed: data.sourceUsed || "backend", cost:"", live:false, buildingCount:null, note: data.note || data.error || "Backend error" };
    return data;
  } catch(err){
    return { sourceUsed:"backend", cost:"", live:false, buildingCount:null, note:"Backend unreachable: " + err.message };
  }
}

// ---------------------------------------------------------------------------
// LIVE — orchestrated lead search via the backend merge pipeline (/api/leads):
// geocode → county routing → footprint/parcel/assessor fetch → merge into
// this app's lead shape. Storm history, permits, and contact enrichment are
// still backend STUBS (the response says exactly which domains are stubbed).
// Falls back to SAMPLE_LEADS demo data if the backend is unreachable.
// ---------------------------------------------------------------------------
async function fetchLeadsForOneZip(zip, searchParams){
  // Always request the full type set from the API. Property-type chips filter
  // client-side so toggling them never burns another GIS round-trip.
  const params = new URLSearchParams({
    zip,
    radius: String(searchParams.radius),
    types: ALL_TYPES.join(",")
  });
  const res = await fetch(`/api/leads?${params}`, {credentials:"include"});
  const data = await res.json();
  return { res, data, zip };
}

function mergeLeadsById(lists){
  const map = new Map();
  for(const leads of lists){
    for(const lead of leads || []){
      const key = lead.id || (lead._provenance && lead._provenance.sourceId) || `${lead.lat},${lead.lng},${lead.address}`;
      const prev = map.get(key);
      if(!prev || (lead.leadScore||0) > (prev.leadScore||0)) map.set(key, lead);
    }
  }
  return [...map.values()].sort((a,b)=>(b.leadScore||0)-(a.leadScore||0));
}

async function fetchHubBatchLeads(hubs, searchParams){
  const lists = [];
  let anyLive = false;
  // Sequential batches of 3 — reuse LEADS_CACHE_MS and avoid stampeding free APIs.
  for(let i=0; i<hubs.length; i+=3){
    const batch = hubs.slice(i, i+3);
    const parts = await Promise.all(batch.map(async (z)=>{
      try{
        const { res, data } = await fetchLeadsForOneZip(z, searchParams);
        if(data?.geo?.lat != null) state.lastGeo = { lat:Number(data.geo.lat), lng:Number(data.geo.lng) };
        if(data?.spcOutlook) state.lastSpcOutlook = data.spcOutlook;
        if(res.ok && data.live){
          anyLive = true;
          return data.leads || [];
        }
        return [];
      }catch{ return []; }
    }));
    lists.push(...parts);
  }
  return { leads: mergeLeadsById(lists).slice(0, 120), anyLive };
}

async function fetchLeadsForSearch(searchParams){
  const zipCatalog = window.IL_COVERED_ZIPS;
  const hubs = zipCatalog && zipCatalog.hubsForSelection(searchParams.zip);
  try{
    if(hubs && hubs.length){
      const { leads: merged, anyLive } = await fetchHubBatchLeads(hubs, searchParams);
      if(!merged.length){
        state.resultsMode = "demo";
        showToast(st("sales.toast.demo","Live search unavailable — showing demo data"));
        return SAMPLE_LEADS.filter(l => searchParams.propertyTypes.includes(l.propertyType));
      }
      state.resultsMode = anyLive ? "live" : "demo";
      return merged;
    }

    const { res, data } = await fetchLeadsForOneZip(searchParams.zip, searchParams);
    if(data?.geo?.lat != null && data?.geo?.lng != null){
      state.lastGeo = { lat: Number(data.geo.lat), lng: Number(data.geo.lng) };
    }
    if(!res.ok || !data.live){
      state.resultsMode = "demo";
      showToast(data.note || data.error || st("sales.toast.demo","Live search unavailable — showing demo data"));
      return SAMPLE_LEADS.filter(l => searchParams.propertyTypes.includes(l.propertyType));
    }
    state.resultsMode = "live";
    if(data.spcOutlook) state.lastSpcOutlook = data.spcOutlook;
    return data.leads;
  } catch(err){
    state.resultsMode = "demo";
    showToast(st("sales.toast.backendDown","Backend unreachable — showing demo data"));
    return SAMPLE_LEADS.filter(l => searchParams.propertyTypes.includes(l.propertyType));
  }
}

function leadLatLng(l){
  if(!l) return null;
  const lat = Number(l.lat);
  const lng = Number(l.lng);
  if(!Number.isFinite(lat) || !Number.isFinite(lng)) return null;
  if(Math.abs(lat) > 90 || Math.abs(lng) > 180) return null;
  return { lat, lng };
}
function haversineMi(lat1, lon1, lat2, lon2){
  const R = 3958.7613;
  const toRad = (d) => d * Math.PI / 180;
  const dLat = toRad(lat2 - lat1);
  const dLon = toRad(lon2 - lon1);
  const a = Math.sin(dLat / 2) ** 2
    + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon / 2) ** 2;
  return 2 * R * Math.asin(Math.min(1, Math.sqrt(a)));
}
/** Miles from Premier office — prefer server/sample distanceMiles, else Haversine. */
function leadDistanceMiles(lead){
  if(lead && lead.distanceMiles != null && Number.isFinite(Number(lead.distanceMiles))){
    return Math.round(Number(lead.distanceMiles) * 10) / 10;
  }
  const ll = leadLatLng(lead);
  if(!ll) return null;
  return Math.round(haversineMi(SALES_OFFICE.lat, SALES_OFFICE.lng, ll.lat, ll.lng) * 10) / 10;
}
function fmtMiles(mi){
  if(mi == null || !Number.isFinite(Number(mi))) return "—";
  return `${Number(mi).toFixed(1)} mi`;
}
function leadsCoordStats(leads = getFilteredSortedLeads()){
  const total = leads.length;
  const withCoords = leads.filter(l => leadLatLng(l)).length;
  return { total, withCoords, missing: Math.max(0, total - withCoords) };
}

function dataModeBannerHtml(){

  if(state.resultsMode === "demo"){

}

function setZipSelection(value, { syncSearch = true, close = true, autoSearch = true } = {}){

function setSearchStatusLoading(on){

/** Debounced live search: ZIP/radius changes only. Types/filters stay local. */
function scheduleAutoSearch({ immediate = false } = {}){
  clearTimeout(_autoSearchTimer);
  // Immediate busy feedback during debounce — ZIP/radius changes must never feel idle.
  state.loading = true;
  setSearchStatusLoading(true);
  const delay = immediate ? 0 : (isMultiAreaZip() ? 800 : 450);
  _autoSearchTimer = setTimeout(() => { runLiveSearch(); }, delay);
}

async function runLiveSearch(){
  commitZipFromSearchBox();
  if(window.IL_COVERED_ZIPS) window.IL_COVERED_ZIPS.saveZip(state.searchParams.zip);
  const key = searchFetchKey();
  if(state.fetchedSearchKey === key && state.results.length){
    state.hasSearched = true;
    state.loading = false;
    setSearchStatusLoading(false);
    return;
  }
  const seq = ++_autoSearchSeq;
  state.loading = true;
  // Soft status + map overlay only — do not remount Leaflet twice (loading + results).
  setSearchStatusLoading(true);
  let ok = false;
  try{
    const leads = await fetchLeadsForSearch(state.searchParams);
    if(seq !== _autoSearchSeq) return; // newer search started
    state.results = leads;
    state.fetchedSearchKey = key;
    state.hasSearched = true;
    ok = true;
  } catch (err) {
    if(seq === _autoSearchSeq){
      showToast(st("sales.toast.searchFailed","Could not update leads — try again"));
    }
  } finally {
    if(seq === _autoSearchSeq){
      state.loading = false;
      render(); // single remount when data is ready (also clears soft overlay)
      if(ok){
        showToast(st("sales.toast.found","{n} leads near {zip}", {
          n: getFilteredSortedLeads().length,
          zip: zipDisplayLabel(state.searchParams.zip)
        }));
      }
    }
  }
}

function attachZipCombo(){
  const root = document.getElementById("zip-combo");
  const search = document.getElementById("zip-combo-search");
  const list = document.getElementById("zip-combo-list");
  if(!root || !search || !list) return;

  let activeIdx = -1;
  const optionButtons = () => [...list.querySelectorAll("[data-zip-value]")];

  function highlight(idx){
    const btns = optionButtons();
    btns.forEach((b,i)=> b.classList.toggle("active", i===idx));
    if(idx>=0 && btns[idx]) btns[idx].scrollIntoView({ block:"nearest" });
    activeIdx = idx;
  }

  search.addEventListener("focus", ()=>{
    search.select();
    openZipCombo("");
    activeIdx = -1;
  });
  search.addEventListener("input", ()=>{
    openZipCombo(search.value);
    activeIdx = -1;
  });
  search.addEventListener("keydown", (e)=>{
    const btns = optionButtons();
    if(e.key === "ArrowDown"){
      e.preventDefault();
      if(list.hidden) openZipCombo(search.value);
      highlight(Math.min((activeIdx < 0 ? -1 : activeIdx) + 1, Math.max(optionButtons().length - 1, 0)));
    } else if(e.key === "ArrowUp"){
      e.preventDefault();
      highlight(Math.max(activeIdx - 1, 0));
    } else if(e.key === "Enter"){
      e.preventDefault();
      const fresh = optionButtons();
      const pick = activeIdx >= 0 ? fresh[activeIdx] : fresh[0];
      if(pick) setZipSelection(pick.dataset.zipValue);
    } else if(e.key === "Escape"){
      e.preventDefault();
      closeZipCombo();
      search.blur();
    }
  });
  search.addEventListener("blur", ()=>{
    setTimeout(()=>{
      if(!root.contains(document.activeElement)) closeZipCombo();
    }, 140);
  });
  list.addEventListener("mousedown", (e)=>{
    const btn = e.target.closest("[data-zip-value]");
    if(!btn) return;
    e.preventDefault();
    setZipSelection(btn.dataset.zipValue);
  });
}

function commitZipFromSearchBox(){
  const search = document.getElementById("zip-combo-search");
  const cat = window.IL_COVERED_ZIPS;
  if(!search) return;
  const raw = search.value.trim();
  if(!raw) return;
  if(zipDisplayLabel(state.searchParams.zip) === raw) return;
  if(!cat){
    const digits = raw.replace(/\D/g,"").slice(0,5);
    if(/^\d{5}$/.test(digits)) state.searchParams.zip = digits;
    return;
  }
  const digits = raw.replace(/\D/g,"").slice(0,5);
  if(/^\d{5}$/.test(digits) && cat.find(digits)){
    setZipSelection(digits, { autoSearch: false });
    return;
  }
  const opts = buildZipComboOptions(raw).filter(o => !o.special || o.label.toLowerCase().includes(raw.toLowerCase()));
  const exactZip = opts.find(o => o.value === digits);
  if(exactZip){ setZipSelection(exactZip.value, { autoSearch: false }); return; }
  if(opts.length === 1){ setZipSelection(opts[0].value, { autoSearch: false }); return; }
  closeZipCombo();
}

async function crmFetchJson(url, body){
  const res = await fetch(url, {
    method:"POST", credentials:"include",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify(body)
  });
  const text = await res.text();
  let data = null;
  try { data = text ? JSON.parse(text) : null; }
  catch { data = { error: text.slice(0, 180) || `HTTP ${res.status}` }; }
  if(res.status === 401){
    const next = encodeURIComponent(location.pathname + location.search);
    location.href = `/login.html?next=${next}&expired=1`;
    throw new Error(data?.error || "Session expired");
  }
  if(!res.ok){
    throw new Error(data?.error || data?.message || `CRM HTTP ${res.status}`);
  }
  return data || {};
}

function st(key, fallback, vars){

function showToast(msg, opts = {}){

// ---------------------------------------------------------------------------
// FILTER + SORT (operates on state.results, which comes from fetchLeadsForSearch)
// ---------------------------------------------------------------------------
function getFilteredSortedLeads(){
  let leads = [...state.results];
  const sp = state.searchParams;
  leads = leads.filter(l => sp.propertyTypes.includes(l.propertyType));
  // Storm filter is client-side only; while storm data is stubbed, never apply it.
  if(sp.stormOnly && !isStormDataStubbed()) leads = leads.filter(l => leadHasStormSignal(l));
  if(sp.minRoofSqFt > 0){
    const minRoof = Number(sp.minRoofSqFt) || 0;
    leads = leads.filter(l => {
      const roof = Number(l.roofSqFt);
      // Missing/invalid roof area fails a positive min-roof filter.
      return Number.isFinite(roof) && roof >= minRoof;
    });
  }
  if(sp.priorityFilter !== "All") leads = leads.filter(l => l.priority === sp.priorityFilter);

  leads.sort((a,b)=>{
    let cmp = 0;
    if(state.sortBy === "leadScore") cmp = (a.leadScore||0) - (b.leadScore||0);
    else if(state.sortBy === "roofSqFt") cmp = (a.roofSqFt||0) - (b.roofSqFt||0);
    else if(state.sortBy === "propertyValue") cmp = (a.propertyValue||0) - (b.propertyValue||0);
    else if(state.sortBy === "hailWindRisk") cmp = (RISK_ORDER[a.hailWindRisk]||0) - (RISK_ORDER[b.hailWindRisk]||0);
    return state.sortDir === "asc" ? cmp : -cmp;
  });
  return leads;
}

// ---------------------------------------------------------------------------
// OWNER GROUPING — one owner = one call. Multiple parcels under the same
// registered owner collapse into a portfolio group (the strongest commercial
// pitch: audit the whole portfolio, not one building). Leads without an
// owner of record (Chicago/Cook footprints) stay individual.
// ---------------------------------------------------------------------------
function groupLeadsByOwner(leads){
  const map = new Map();
  for(const l of leads){
    const key = l.ownerEntity || ("__solo__" + l.id);
    if(!map.has(key)) map.set(key, {
      owner: l.ownerEntity, leads: [], types: new Set(),
      totalRoofSqFt: 0, totalValue: 0, bestScore: -1, bestLead: null,
      priority: "Cold", phone: null, phoneIsOwnerMatch: false
    });
    const g = map.get(key);
    g.leads.push(l);
    g.types.add(l.propertyType);
    g.totalRoofSqFt += l.roofSqFt || 0;
    g.totalValue += l.propertyValue || 0;
    if(l.leadScore > g.bestScore){ g.bestScore = l.leadScore; g.priority = l.priority; g.bestLead = l; }
    // Best phone for the group: prefer an owner-matched business line
    if(l.contactPhone && (!g.phone || (l.contactIsOwnerMatch && !g.phoneIsOwnerMatch))){
      g.phone = l.contactPhone; g.phoneIsOwnerMatch = !!l.contactIsOwnerMatch;
    }
  }
  return [...map.values()].map(g => {
    g.parcels = g.leads.length;
    g.leads.sort((a,b)=>b.leadScore - a.leadScore || (b.roofSqFt||0)-(a.roofSqFt||0));
    return g;
  }).sort((a,b)=> b.bestScore - a.bestScore || b.totalRoofSqFt - a.totalRoofSqFt);
}

function exportCSV(){
  const leads = getFilteredSortedLeads();
  const cols = ["id","name","address","propertyType","manager","ownerEntity","buildingSqFt","roofSqFt","roofType",
    "yearBuilt","roofAge","propertyValue","lastSaleDate","hailWindRisk","leadScore","priority","status"];
  const header = cols.join(",");
  const rows = leads.map(l => cols.map(c => `"${String(l[c]).replace(/"/g,'""')}"`).join(","));
  const csv = [header, ...rows].join("\n");
  const blob = new Blob([csv], {type:"text/csv"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "premier-sales-leads.csv";
  a.click();
  URL.revokeObjectURL(url);
  showToast(st("sales.toast.csv", "CSV exported — {n} leads", { n: leads.length }));
}

// ---------------------------------------------------------------------------
function renderDashboard(){
  const sp = state.searchParams;
  const leads = getFilteredSortedLeads();
  const coordStats = leadsCoordStats(leads);
  const hot = leads.filter(l=>l.priority==="Hot").length;
  const warm = leads.filter(l=>l.priority==="Warm").length;
  const cold = leads.filter(l=>l.priority==="Cold").length;
  const avgRoof = leads.length ? Math.round(leads.reduce((s,l)=>s+(l.roofSqFt||0),0)/leads.length) : 0;
  const stormAffected = leads.filter(l=>l.stormHistory.length>0).length;
  // Rough opportunity value estimate: roof sf * placeholder $/sf blended commercial reroof cost
  const OPPORTUNITY_RATE_PER_SF = 9.5;
  const totalOpportunity = leads.reduce((s,l)=>s + (l.roofSqFt||0) * OPPORTUNITY_RATE_PER_SF * (l.priority==="Hot"?1:l.priority==="Warm"?0.55:0.2), 0);
  const topGroups = groupLeadsByOwner(leads).slice(0,8);

  return `
  ${dataModeBannerHtml()}
  <div class="panel panel-pad section-gap">
    <div class="dash-search${state.loading ? " has-status" : ""}">
      <div>
        <label class="field-label">${st("sales.search.zip","ZIP / area")}</label>
        ${zipSelectHtml(sp.zip)}
      </div>
      <div>
        <label class="field-label">${st("sales.search.radius","Radius")}</label>
        <div class="radius-group">
          ${[5,10,15].map(r => `<button class="radius-opt ${sp.radius===r?"selected":""}" data-radius="${r}">${r} mi</button>`).join("")}
        </div>
      </div>
      <div>
        <label class="field-label">${st("sales.search.types","Property types")}</label>
        <div class="chip-select">
          ${ALL_TYPES.map(t => typeChipHtml(t, sp.propertyTypes.includes(t))).join("")}
        </div>
      </div>
      <div class="search-status-field" ${state.loading ? "" : "hidden"}>
        <label class="field-label">${st("sales.search.status","Status")}</label>
        ${searchStatusHtml()}
      </div>
    </div>
  </div>

  <div class="stat-grid">
    <div class="stat-card"><div class="stat-label">${st("sales.stat.found","Leads found")}</div><div class="stat-value mono">${leads.length}</div><div class="stat-foot">${zipDisplayLabel(sp.zip)} · ${sp.radius} mi · ${st("sales.stat.onMap","{n} on map", {n: coordStats.withCoords})}</div></div>
    <div class="stat-card"><div class="stat-label">${st("sales.stat.priority","Priority")}</div><div class="stat-value mono"><span style="color:var(--hot)">${hot}</span><span style="color:var(--gray-300); font-size:18px;"> / </span><span style="color:var(--warm)">${warm}</span><span style="color:var(--gray-300); font-size:18px;"> / </span><span style="color:var(--cold)">${cold}</span></div><div class="stat-foot">${st("sales.stat.priorityFoot","Hot / Warm / Cold — floored by LSR, SPC outlook, and storm-score")}</div></div>
    <div class="stat-card"><div class="stat-label">${st("sales.stat.avgRoof","Average roof size")}</div><div class="stat-value mono">${fmtSqFt(avgRoof)}</div><div class="stat-foot">${st("sales.stat.stormFoot","{n} properties with storm on record", {n: stormAffected})}</div></div>
    <div class="stat-card"><div class="stat-label">${st("sales.stat.opportunity","Estimated opportunity")}</div><div class="stat-value accent mono">${fmtMoney(totalOpportunity)}</div><div class="stat-foot">${st("sales.stat.oppFoot","Modeled at ${rate}/sf, weighted by priority", {rate: OPPORTUNITY_RATE_PER_SF})}</div></div>
  </div>

  <div class="dash-main">
    <div class="panel" style="overflow:hidden;">
      <div id="results-map" class="map-wrap" style="height:430px;"></div>
      <div class="map-legend">
        ${mapMarkerLegendHtml(true)}
        <span class="map-legend-tools">
          ${mapColorModeToggleHtml()}
          <span>${st("sales.map.legendHint","Click a marker → profile · satellite view in the top-right control")}</span>
        </span>
      </div>
    </div>
    <div class="panel panel-pad" style="display:flex; flex-direction:column;">
      <div class="panel-title">${st("sales.topOpps","Top opportunities")}</div>
      <div class="panel-desc" style="margin-bottom:6px;">${st("sales.topOpps.sub","By owner — one call per owner, not per parcel")}</div>
      <div class="top-lead-list">
        ${topGroups.length ? topGroups.map(g => `
          <div class="top-lead" data-open-lead="${g.bestLead.id}">
            <div style="min-width:0;">
              <div class="tl2-name">${g.owner || g.bestLead.name}</div>
              <div class="tl2-meta">${g.parcels>1 ? `<b style="color:var(--blue-accent-dark)">${st("sales.topOpps.parcels","×{n} parcels", {n: g.parcels})}</b> · ` : ""}${[...g.types].join(" · ")} · ${fmtSqFt(g.totalRoofSqFt)}</div>
            </div>
            <span class="score-pill ${scoreClass(g.priority)}">${g.bestScore}<span class="max">/100</span></span>
          </div>`).join("") : `<div class="empty-state" style="padding:36px 10px;"><h3>${st("sales.empty.noResults","No results yet")}</h3>${st("sales.empty.runSearch","Run a search above.")}</div>`}
      </div>
      <button class="btn btn-sm" data-nav="results" style="margin-top:auto; justify-content:center;">${st("sales.viewAll","View all {n} leads →", { n: leads.length })}</button>
    </div>
  </div>

  <div class="panel panel-pad">
    <div class="panel-title">${st("sales.sourcesTitle","Data source status")}</div>
    <div class="panel-desc">${st("sales.sourcesDesc","Green = live · gray = pending key or integration")}</div>
    <div id="source-status" class="status-chips">${renderSourceStatus()}</div>
  </div>
  `;
}
function renderSourceStatus(){
  const s = state.sourceStatus;
  if(!s) return `<span style="font-size:12px; color:var(--gray-500);">${st("sales.sourcesChecking","Checking /api/status...")}</span>`;
  const chips = [];
  for(const [k,v] of Object.entries(s.live||{})){
    if(v) chips.push(`<span class="src-chip src-live">●&nbsp;${k}${typeof v==="string" ? " · "+v : ""}</span>`);
  }
  for(const [k,v] of Object.entries(s.stubbed||{})){
    if(v) chips.push(`<span class="src-chip src-stub">○&nbsp;${k}</span>`);
  }
  return chips.join("");
}
async function loadSourceStatus(){
  if(state.sourceStatus) return;
  try{
    const res = await fetch("/api/status", {credentials:"include"});
    state.sourceStatus = await res.json();
    if(isStormDataStubbed() && state.searchParams.stormOnly){
      state.searchParams.stormOnly = false;
    }
    const el = document.getElementById("source-status");
    if(el) el.innerHTML = renderSourceStatus();
    // Soft-refresh storm checkbox (enable when live, keep DEMO badge when stubbed).
    refreshStormOnlyControl();
  } catch(e){ /* panel keeps its loading text */ }
}
function iconInfo(){ return `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0; margin-top:1px;"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>`; }

// (Search Panel page removed — search lives on the Dashboard; filters on Results)
function iconSearch2(){ return `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:1px"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>`; }

function renderResults(){
  const leads = getFilteredSortedLeads();
  const sp = state.searchParams;
  const coordStats = leadsCoordStats(leads);
  const toolbar = `
    ${dataModeBannerHtml()}
    <div class="results-toolbar">
      <div style="font-size:13px; color:var(--gray-500);">${st("sales.results.count","{n} leads · ZIP {zip}, {radius} mi", {n: leads.length, zip: sp.zip, radius: sp.radius})} · ${st("sales.stat.onMap","{n} on map", {n: coordStats.withCoords})}</div>
      <div style="display:flex; align-items:center; gap:14px;">
        <div class="sort-select">
          ${st("sales.results.sortBy","Sort by")}
          <select class="input" id="sort-select" style="width:auto; padding:6px 10px;">
            <option value="leadScore" ${state.sortBy==="leadScore"?"selected":""}>${st("sales.sort.leadScore","Lead score")}</option>
            <option value="roofSqFt" ${state.sortBy==="roofSqFt"?"selected":""}>${st("sales.sort.roofSqFt","Roof size")}</option>
            <option value="propertyValue" ${state.sortBy==="propertyValue"?"selected":""}>${st("sales.sort.propertyValue","Property value")}</option>
            <option value="hailWindRisk" ${state.sortBy==="hailWindRisk"?"selected":""}>${st("sales.sort.hailWindRisk","Storm risk")}</option>
          </select>
          <button type="button" class="btn btn-sm sort-dir-btn" data-action="toggle-sort-dir" title="${st("sales.sort.toggleDir","Toggle ascending / descending")}">
            ${state.sortDir==="asc" ? st("sales.sort.asc","Asc ↑") : st("sales.sort.desc","Desc ↓")}
          </button>
        </div>
        <button class="btn btn-sm ${state.showResultsMap?"btn-primary":""}" data-action="toggle-results-map">${state.showResultsMap?st("sales.map.hide","Hide map"):st("sales.map.show","Show map")}</button>
        <div class="view-toggle">
          <button class="${state.resultsView==="owners"?"active":""}" data-results-view="owners">${st("sales.view.owners","Owners")}</button>
          <button class="${state.resultsView==="table"?"active":""}" data-results-view="table">${st("sales.view.table","Table")}</button>
          <button class="${state.resultsView==="cards"?"active":""}" data-results-view="cards">${st("sales.view.cards","Cards")}</button>
        </div>
      </div>
    </div>
    <div class="results-filters">
      ${stormOnlyControlHtml(sp)}
      <span class="sort-select">${st("sales.filter.minRoof","Min roof size (sf)")} <input class="input" id="min-roof" type="number" min="0" step="1000" value="${sp.minRoofSqFt}" style="width:110px; padding:6px 10px;"></span>
      <span class="sort-select">${st("sales.filter.priority","Priority")} <select class="input" id="priority-filter" style="width:auto; padding:6px 10px;">${["All","Hot","Warm","Cold"].map(p=>`<option value="${p}" ${sp.priorityFilter===p?"selected":""}>${p==="All"?st("sales.filter.all","All"):priorityLabel(p)}</option>`).join("")}</select></span>
    </div>`;

  const mapPanel = !state.showResultsMap ? "" : `
    <div class="panel section-gap" style="overflow:hidden;">
      <div id="results-map" class="map-wrap"></div>
      <div class="map-legend">
        ${mapMarkerLegendHtml(true)}
        <span class="map-legend-tools">
          ${mapColorModeToggleHtml()}
          <span>${st("sales.map.legendHint","Click a marker → profile · satellite view in the top-right control")}</span>
        </span>
      </div>
    </div>`;

  if(leads.length === 0){
    return toolbar + `<div class="panel"><div class="empty-state"><h3>${st("sales.empty.noMatch","No leads match these filters")}</h3>${st("sales.empty.widen","Try widening the radius, adding property types, or clearing filters in the Dashboard.")}</div></div>`;
  }

  if(state.resultsView === "owners"){
    const groups = groupLeadsByOwner(leads);
    const multi = groups.filter(g=>g.parcels>1).length;
    return toolbar + mapPanel + `
    <div style="font-size:12.5px; color:var(--gray-500); margin-bottom:12px;">${st("sales.owners.summary","{n} distinct owners · {multi} with multi-parcel portfolios — one call per owner, not per parcel", {n: groups.length, multi})}</div>
    ` + groups.map(g => `
      <div class="panel owner-group">
        <div class="og-head" data-open-lead="${g.bestLead.id}">
          <div style="min-width:0;">
            <div class="og-name">${g.owner || g.bestLead.name}</div>
            <div class="og-meta">${g.parcels} parcel${g.parcels>1?"s":""} · ${[...g.types].join(" · ")} · ${st("sales.owners.totalRoof","total roof {sqft}", {sqft: fmtSqFt(g.totalRoofSqFt)})}${g.totalValue ? st("sales.owners.assessed"," · assessed {val}", {val: fmtMoney(g.totalValue)}) : ""}</div>
          </div>
          <div style="display:flex; align-items:center; gap:12px; flex-shrink:0;">
            ${g.phone ? `<a href="tel:${g.phone.replace(/[^0-9+]/g,"")}" class="og-phone" onclick="event.stopPropagation()" title="${g.phoneIsOwnerMatch ? st("sales.owners.ownerOccupant","owner-occupant line") : st("sales.owners.onSite","on-site business (likely tenant)")}">${g.phoneIsOwnerMatch ? "☎ " : "☎? "}${g.phone}</a>` : ""}
            ${g.parcels>1 ? `<span class="og-badge">${st("sales.owners.portfolio","PORTFOLIO ×{n}", {n: g.parcels})}</span>` : ""}
            ${inCrmBadge(g.bestLead)}
            <span class="score-pill ${scoreClass(g.priority)}">${g.bestScore}<span class="max">/100</span></span>
          </div>
        </div>
        ${g.parcels>1 ? `<div class="og-leads">${g.leads.map(l => `
          <div class="og-lead" data-open-lead="${l.id}">
            <span class="og-addr">${l.address}</span>
            <span class="mono">${fmtSqFt(l.roofSqFt)}</span>
            <span class="score-pill ${scoreClass(l.priority)}" style="font-size:11.5px; padding:2px 7px;">${l.leadScore}</span>
            <span class="status-chip ${statusClass(l.status)}">${l.status}</span>
            ${inCrmBadge(l)}
          </div>`).join("")}</div>` : ""}
      </div>`).join("");
  }

  if(state.resultsView === "table"){
    return toolbar + mapPanel + `
    <div class="panel table-wrap">
      <table class="lead-table">
        <thead><tr>
          <th>${st("sales.th.property","Property")}</th><th>${st("sales.th.type","Type")}</th><th>${st("sales.th.manager","Manager")}</th><th>${st("sales.th.roofSize","Roof size")}</th><th>${st("sales.th.roofAge","Roof age")}</th>
          <th>${st("sales.th.value","Value")}</th><th>${st("sales.th.risk","Risk")}</th><th>${st("sales.th.score","Score")}</th><th>${st("sales.th.priority","Priority")}</th><th>${st("sales.th.status","Status")}</th>
        </tr></thead>
        <tbody>
          ${leads.map(l => `
            <tr data-open-lead="${l.id}">
              <td><div class="lt-name">${l.name}</div><div class="lt-sub">${l.address}</div></td>
              <td>${l.propertyType}</td>
              <td>${l.manager ?? "—"}</td>
              <td>${fmtSqFt(l.roofSqFt)}</td>
              <td>${l.roofAge != null ? l.roofAge + st("sales.card.yrs"," yrs") : "—"}</td>
              <td>${fmtMoney(l.propertyValue)}</td>
              <td>${(() => { const chips = stormSignalChipsHtml(l); return `<span class="risk-chip risk-${l.hailWindRisk}">${l.hailWindRisk}</span>${chips ? ` ${chips}` : ""}`; })()}</td>
              <td><span class="score-pill ${scoreClass(l.priority)}">${l.leadScore}<span class="max">/100</span></span></td>
              <td>${priorityBadge(l.priority)}</td>
              <td><span class="status-chip ${statusClass(l.status)}">${l.status}</span></td>
            </tr>
          `).join("")}
        </tbody>
      </table>
    </div>`;
  }

  return toolbar + mapPanel + `
  <div class="lead-grid">
    ${leads.map(l => `
      <div class="lead-card" data-open-lead="${l.id}">
        <div class="lc-head">
          <div>
            <h3 class="lc-name">${l.name}</h3>
            <div class="lc-addr">${l.address}</div>
            <span class="lc-type-tag" style="--type-color:${propertyTypeColor(l.propertyType)}">${l.propertyType}</span>
          </div>
          <span class="score-pill ${scoreClass(l.priority)}">${l.leadScore}<span class="max">/100</span></span>
        </div>
        <div class="lc-grid">
          <div><div class="lc-metric-label">${st("sales.card.roofSize","Roof size")}</div><div class="lc-metric-value">${fmtSqFt(l.roofSqFt)}</div></div>
          <div><div class="lc-metric-label">${st("sales.card.roofAge","Roof age")}</div><div class="lc-metric-value">${l.roofAge != null ? l.roofAge + st("sales.card.yrs"," yrs") : "—"}</div></div>
          <div><div class="lc-metric-label">${st("sales.card.value","Property value")}</div><div class="lc-metric-value">${fmtMoney(l.propertyValue)}</div></div>
          <div><div class="lc-metric-label">${st("sales.card.risk","Storm risk")}</div><div class="lc-metric-value"><span class="risk-chip risk-${l.hailWindRisk}">${l.hailWindRisk}</span> ${stormSignalChipsHtml(l)}</div></div>
        </div>
        <div class="lc-reason">${l.reason}</div>
        <div class="lc-foot">
          ${priorityBadge(l.priority)}
          <span class="status-chip ${statusClass(l.status)}">${l.status}</span>
        </div>
      </div>
    `).join("")}
  </div>`;
}

function updateFilteredLeadCounts(){
  const leads = getFilteredSortedLeads();

  document.querySelectorAll(".nav-item[data-nav='results'] .nav-count, .nav-item[data-nav='map'] .nav-count").forEach((el) => {
    el.textContent = String(leads.length);
  });

/** Soft client-filter refresh on Lead Map — list + counts + markers, no Leaflet remount. */
function softRefreshMapClientFilters(){
  const leads = updateFilteredLeadCounts();
  const list = document.querySelector(".lead-map-list");
  if(list){
    list.innerHTML = leadMapListHtml(leads);
    list.querySelectorAll("[data-focus-lead]").forEach(el=>{
      el.addEventListener("click", (e)=>{
        if(e.target.closest("[data-open-lead],[data-action]")) return;
        window._focusLeadOnMap(el.dataset.focusLead);
      });
    });
    list.querySelectorAll("[data-open-lead]").forEach(el=>{
      el.addEventListener("click", (e)=>{
        e.stopPropagation();
        openLeadProfile(el.dataset.openLead, state.view);
      });
    });
    list.querySelectorAll('[data-action="send-crm"]').forEach(el=>{
      el.addEventListener("click", (e)=>{
        e.stopPropagation();
        confirmSendToCrm(el.dataset.lead);
      });
    });
    list.querySelectorAll('[data-action="create-task"]').forEach(el=>{
      el.addEventListener("click", (e)=>{
        e.stopPropagation();
        confirmCreateTask(el.dataset.lead);
      });
    });
  }
  softSyncLeadMapMarkers(leads);
  if(!state.loading) setMapSearchOverlay(false);
  invalidateLeadMapSize();
}

let _minRoofFilterTimer = null;
function applyMinRoofFilter(raw, { immediate = false } = {}){
  const parsed = parseInt(String(raw ?? "").trim(), 10);
  const next = Number.isFinite(parsed) && parsed > 0 ? parsed : 0;
  if(state.searchParams.minRoofSqFt === next){
    // Still refresh when immediate so blur after debounce stays consistent.
    if(immediate && state.view === "map" && window._leadMap) softRefreshMapClientFilters();
    return;
  }
  state.searchParams.minRoofSqFt = next;
  const run = ()=>{
    if(state.view === "map" && window._leadMap) softRefreshMapClientFilters();
    else render();
  };
  clearTimeout(_minRoofFilterTimer);
  if(immediate) run();
  else _minRoofFilterTimer = setTimeout(run, 220);
}

// MAIN RENDER
// ---------------------------------------------------------------------------
function render(){
  const view = state.view;
  let body = "";
  if(view==="dashboard") body = renderDashboard();
  else if(view==="results") body = renderResults();
  else if(view==="detail") body = renderDetail();
  else if(view==="map") body = renderLeadMap();

  document.getElementById("app").innerHTML = `
    ${renderSidebar()}
    <div class="main view-${view}">
      ${renderTopbar()}
      <div class="content">${body}</div>
    </div>
  `;
  attachEvents();
}

// ---------------------------------------------------------------------------
// EVENTS
// ---------------------------------------------------------------------------
function attachEvents(){
  document.querySelectorAll("[data-nav]").forEach(el=>{
    el.addEventListener("click", ()=>{
      const next = el.dataset.nav;
      // View switches never re-fetch — reuse state.results / searchParams.
      state.view = next;
      render();
    });
  });
  document.querySelectorAll("[data-open-lead]").forEach(el=>{
    el.addEventListener("click", (e)=>{
      e.stopPropagation();
      openLeadProfile(el.dataset.openLead, state.view);
    });
  });
  document.querySelectorAll("[data-focus-lead]").forEach(el=>{
    el.addEventListener("click", (e)=>{
      if(e.target.closest("[data-open-lead],[data-action]")) return;
      // Soft focus — do not remount Leaflet / re-fetch.
      window._focusLeadOnMap(el.dataset.focusLead);
    });
  });
  const backBtn = document.querySelector('[data-action="back-from-detail"]');
  if(backBtn) backBtn.addEventListener("click", ()=>{
    state.view = state.detailReturnView || "results";
    render();
  });

  const exportBtn = document.querySelector('[data-action="export-csv"]');
  if(exportBtn) exportBtn.addEventListener("click", exportCSV);

  // Search panel
  attachZipCombo();
  document.querySelectorAll("[data-radius]").forEach(el=>{
    el.addEventListener("click", ()=>{
      const r = parseInt(el.dataset.radius, 10);
      if(state.searchParams.radius === r) return;
      state.searchParams.radius = r;
      // Soft UI update — avoid remounting the map before fetch completes.
      document.querySelectorAll("[data-radius]").forEach(b=>{
        b.classList.toggle("selected", parseInt(b.dataset.radius, 10) === r);
      });
      scheduleAutoSearch();
    });
  });
  document.querySelectorAll("[data-type-toggle]").forEach(el=>{
    el.addEventListener("click", ()=>{
      const t = el.dataset.typeToggle;
      const idx = state.searchParams.propertyTypes.indexOf(t);
